<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pub Cricket Captain</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F5F0E8; --parchment: #EDE6D6; --dark: #1A1208; --ink: #2C2010;
  --mid: #6B5840; --light: #9B8B78; --border: #C8B89A;
  --green: #2D5016; --green-pale: #E8F0DF;
  --red: #7A1B1B; --red-pale: #F5E8E8;
  --gold: #8B6914; --gold-light: #C9A227; --gold-pale: #F5EDD6;
  --blue: #1A3A5C; --blue-pale: #E0EAF5;
  --r: 4px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  background: var(--cream); color: var(--ink);
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: 15px; line-height: 1.45;
}
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(0,0,0,.012) 40px,rgba(0,0,0,.012) 41px),
    repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(0,0,0,.012) 40px,rgba(0,0,0,.012) 41px);
}
.wrap { max-width: 520px; margin: 0 auto; padding: 12px 12px 80px; position: relative; z-index: 1; }

/* Masthead */
.mast { text-align:center; border-top:2px solid var(--dark); border-bottom:2px solid var(--dark); padding:8px 0 6px; margin-bottom:14px; }
.mast-sup { font-size:9px; letter-spacing:.2em; text-transform:uppercase; color:var(--mid); }
.mast-title { font-family:'Playfair Display',serif; font-size:26px; font-weight:700; color:var(--dark); line-height:1; }
.mast-sub { font-size:10px; color:var(--mid); font-style:italic; margin-top:2px; }

/* Cards */
.card { background:var(--parchment); border:1px solid var(--border); border-radius:var(--r); padding:10px 12px; margin-bottom:10px; }
.card-title { font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--mid); border-bottom:1px solid var(--border); padding-bottom:4px; margin-bottom:8px; }
.must-change { border-color:var(--red)!important; }
.must-change .card-title { color:var(--red)!important; }

/* Scoreboard */
.scoreboard { background:var(--dark); color:var(--cream); border-radius:var(--r); padding:10px 12px; display:grid; grid-template-columns:repeat(4,1fr); gap:4px; text-align:center; }
.sb-label { font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--light); margin-bottom:2px; }
.sb-val { font-family:'Playfair Display',serif; font-size:22px; font-weight:600; color:var(--cream); line-height:1; }
.sb-val.runs { color:#C9D8B6; } .sb-val.wkts { color:#E8B4A0; }
.sb-val.sm { font-size:12px; padding-top:4px; }

/* Log — sits beside scoreboard */
.log-box { background:var(--dark); border-radius:var(--r); padding:10px 12px; overflow-y:auto; }
.log-title { font-size:8px; letter-spacing:.18em; text-transform:uppercase; color:var(--light); margin-bottom:5px; }
.log-entry { font-size:13px; padding:2px 0; border-bottom:1px solid rgba(255,255,255,.06); color:#C8B89A; }
.log-entry:last-child { border-bottom:none; }
.log-entry.wkt { color:#E8B4A0; } .log-entry.boundary { color:#C9D8B6; font-style:italic; }
.log-entry.howzat { color:var(--gold-light); font-weight:600; }
.log-entry.review { color:#B8C8D8; font-style:italic; } .log-entry.over { color:var(--light); font-style:italic; font-size:12px; }

/* Commentary banner */
.commentary { background:var(--dark); color:var(--cream); border-radius:var(--r); padding:14px 16px; margin-bottom:10px; min-height:58px; display:flex; align-items:center; }
.comm-text { font-size:19px; font-family:'Playfair Display',serif; line-height:1.35; color:var(--cream); flex:1; }
.comm-text.boundary { color:#C9D8B6; }
.comm-text.wkt { color:#E8B4A0; }
.comm-text.howzat { color:var(--gold-light); }
.comm-text.over { color:var(--light); font-size:13px; font-style:italic; }
.comm-text.review { color:#B8C8D8; font-style:italic; }

/* Conditions bar */
.cond-bar { display:flex; gap:6px; align-items:center; background:var(--dark); color:var(--cream); border-radius:var(--r); padding:7px 12px; margin-bottom:10px; font-size:11px; flex-wrap:wrap; }
.cond-label { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--light); }
.cond-val { font-family:'Playfair Display',serif; font-size:12px; }
.cond-sep { color:var(--mid); }

/* Target banner */
.target-banner { display:flex; gap:12px; align-items:center; flex-wrap:wrap; border:1px solid var(--border); border-radius:var(--r); padding:10px 12px; margin-bottom:10px; background:linear-gradient(135deg,var(--green-pale),var(--parchment)); }
.target-score { font-family:'Playfair Display',serif; font-size:26px; font-weight:600; color:var(--green); }

/* Tags */
.tag { display:inline-block; font-size:11px; padding:2px 6px; border-radius:2px; font-weight:600; letter-spacing:.03em; }
.tag-green { background:var(--green-pale); color:var(--green); }
.tag-red { background:var(--red-pale); color:var(--red); }
.tag-gold { background:var(--gold-pale); color:var(--gold); }
.tag-mid { background:var(--parchment); color:var(--mid); border:1px solid var(--border); }

/* Buttons */
.btn { font-family:'Source Serif 4',serif; border-radius:var(--r); cursor:pointer; transition:all .12s; border:1px solid var(--border); background:var(--cream); color:var(--ink); font-size:13px; padding:9px 16px; touch-action:manipulation; }
.btn:active:not(:disabled) { transform:scale(.97); }
.btn:disabled { opacity:.35; cursor:not-allowed; }
.btn-primary { background:var(--dark); color:var(--cream); border-color:var(--dark); font-size:15px; padding:12px 32px; width:100%; }
.btn-danger { background:var(--red-pale); color:var(--red); border-color:var(--red); }
.btn-danger:active:not(:disabled) { background:var(--red); color:#fff; }
.btn-gold { background:var(--gold-pale); color:var(--gold); border-color:var(--gold); }
.btn-gold:active:not(:disabled) { background:var(--gold); color:#fff; }
.btn-green { background:var(--green-pale); color:var(--green); border-color:var(--green); font-size:14px; padding:11px 24px; width:100%; }
.btn-green:active:not(:disabled) { background:var(--green); color:#fff; }
.btn-sm { font-size:13px; padding:7px 14px; }

/* Bowler buttons */
.b-grid { display:flex; gap:5px; flex-wrap:wrap; }
.b-btn { padding:6px 10px; font-size:11px; border:1px solid var(--border); border-radius:var(--r); cursor:pointer; background:var(--cream); color:var(--ink); font-family:'Source Serif 4',serif; touch-action:manipulation; }
.b-btn.sel { background:var(--dark); color:var(--cream); border-color:var(--dark); }
.b-btn:disabled { opacity:.35; cursor:not-allowed; }
.b-meta { font-size:8px; color:var(--mid); text-align:center; margin-top:2px; }

/* Field buttons */
.f-btn { flex:1; padding:8px 4px; font-size:12px; border:1px solid var(--border); border-radius:var(--r); cursor:pointer; background:var(--cream); color:var(--ink); font-family:'Source Serif 4',serif; touch-action:manipulation; text-align:center; }
.f-btn.attacking.sel { background:var(--red-pale); border-color:var(--red); color:var(--red); font-weight:600; }
.f-btn.balanced.sel  { background:var(--green-pale); border-color:var(--green); color:var(--green); font-weight:600; }
.f-btn.defensive.sel { background:var(--blue-pale); border-color:var(--blue); color:var(--blue); font-weight:600; }

/* Over pips */
.pips { display:flex; gap:4px; margin-top:5px; }
.pip { width:11px; height:11px; border-radius:50%; background:var(--border); }
.pip.done { background:var(--mid); } .pip.wkt { background:var(--red); } .pip.boundary { background:var(--green); }

/* Batsmen grid — 2 col on mobile */
.bat-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
.bat-card { padding:6px 8px; border:1px solid var(--border); border-radius:var(--r); font-size:11px; background:var(--cream); }
.bat-card.active { border-color:var(--dark); background:var(--dark); color:var(--cream); }
.bat-card.out { opacity:.35; }
.bat-name { font-family:'Playfair Display',serif; font-size:12px; font-weight:600; }
.bat-card.active .bat-info { color:var(--light); }
.bat-info { font-size:11px; color:var(--mid); margin-top:1px; }

/* Stars */
.stars { color:var(--gold-light); font-size:10px; letter-spacing:1px; }

/* Umpires */
.ump-row { display:flex; gap:6px; }
.ump-card { flex:1; padding:7px 9px; border:1px solid var(--border); border-radius:var(--r); }
.ump-card.active { border-color:var(--dark); background:var(--dark); color:var(--cream); }
.ump-name { font-family:'Playfair Display',serif; font-size:12px; font-weight:600; }
.ump-card.active .ump-stat { color:var(--light); }
.ump-stat { font-size:11px; color:var(--mid); margin-top:1px; }

/* Die */
.die-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:10px; }
.die-wrap { text-align:center; }
.die { width:52px; height:52px; border:1.5px solid var(--border); border-radius:var(--r); display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-size:20px; font-weight:600; background:var(--cream); }
.die.active { border-color:var(--dark); background:var(--dark); color:var(--cream); }
.die.wkt { border-color:var(--red); background:var(--red-pale); color:var(--red); }
.die.boundary { border-color:var(--green); background:var(--green-pale); color:var(--green); }
.die.howzat { border-color:var(--gold); background:var(--gold-pale); color:var(--gold); }
.die-label { font-size:8px; color:var(--mid); margin-top:2px; text-transform:uppercase; letter-spacing:.06em; }

/* Bars */
.bar-track { height:3px; border-radius:2px; background:var(--border); overflow:hidden; margin-top:3px; }
.bar-fill { height:100%; border-radius:2px; transition:width .3s; }

/* Pending */
.pending-box { border:1px solid var(--gold); border-radius:var(--r); padding:10px 12px; margin-bottom:10px; background:var(--gold-pale); }
.pending-title { font-family:'Playfair Display',serif; font-size:14px; font-weight:600; color:var(--gold); margin-bottom:3px; }
.pending-sub { font-size:11px; color:var(--ink); margin-bottom:8px; }
.pending-btns { display:flex; gap:6px; flex-wrap:wrap; }
.pending-btns .btn { flex:1; font-size:12px; padding:8px 8px; text-align:center; }

/* Result banners */
.result-banner { text-align:center; padding:16px; border-radius:var(--r); margin-bottom:12px; }
.result-win  { background:var(--green-pale); border:1px solid var(--green); color:var(--green); }
.result-loss { background:var(--red-pale);   border:1px solid var(--red);   color:var(--red); }
.result-tie  { background:var(--blue-pale);  border:1px solid var(--blue);  color:var(--blue); }
.result-title { font-family:'Playfair Display',serif; font-size:18px; font-weight:600; }
.innings-banner { text-align:center; padding:14px; border:1px solid var(--border); border-radius:var(--r); margin-bottom:10px; background:var(--parchment); }

/* Setup screens */
.setup { text-align:center; padding:10px 0; }
.setup-title { font-family:'Playfair Display',serif; font-size:20px; font-weight:600; margin-bottom:5px; }
.setup-sub { font-size:12px; color:var(--mid); margin-bottom:18px; font-style:italic; }
.coin { width:76px; height:76px; border-radius:50%; background:var(--dark); color:var(--cream); display:flex; align-items:center; justify-content:center; font-size:28px; margin:0 auto 18px; border:3px solid var(--gold-light); cursor:pointer; box-shadow:0 4px 16px rgba(0,0,0,.2); touch-action:manipulation; }
.coin.spin { animation:coinSpin .6s ease-out; }
@keyframes coinSpin { 0%{transform:rotateY(0)} 50%{transform:rotateY(360deg) scale(1.1)} 100%{transform:rotateY(720deg)} }
.choice-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; max-width:360px; margin-left:auto; margin-right:auto; }
.choice-card.sel { border-color:var(--gold-light);background:var(--gold-pale); }
.choice-card { padding:12px 8px; border:1px solid var(--border); border-radius:var(--r); cursor:pointer; background:var(--cream); text-align:center; transition:all .1s; touch-action:manipulation; }
.choice-card:active { border-color:var(--dark); background:var(--dark); color:var(--cream); }
.cc-icon { font-size:22px; margin-bottom:5px; }
.cc-name { font-family:'Playfair Display',serif; font-size:13px; font-weight:600; margin-bottom:2px; }
.cc-desc { font-size:10px; color:var(--mid); line-height:1.3; }

/* Info row */
.info-row { display:flex; gap:5px; align-items:center; flex-wrap:wrap; margin-top:6px; font-size:10px; color:var(--mid); }

/* Bowler select screen */
.bowler-overlay { position:fixed; inset:0; background:var(--cream); z-index:95; overflow-y:auto; padding:12px 12px 80px; }
.bowler-card { background:var(--parchment); border:1px solid var(--border); border-radius:var(--r); padding:14px 16px; margin-bottom:10px; cursor:pointer; touch-action:manipulation; }
.bowler-card.sel { border-color:var(--dark); background:var(--dark); color:var(--cream); }
.bowler-card.used { opacity:.35; pointer-events:none; }
.bowler-card.locked { opacity:.5; pointer-events:none; }
.bowler-card-name { font-family:'Playfair Display',serif; font-size:19px; font-weight:600; margin-bottom:3px; }
.bowler-card-detail { font-size:13px; color:var(--mid); margin-bottom:8px; }
.bowler-card.sel .bowler-card-detail { color:var(--light); }
.bowler-card-stats { display:flex; gap:20px; }
.bowler-stat-val { font-family:'Playfair Display',serif; font-size:18px; font-weight:600; line-height:1; }
.bowler-stat-label { font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--mid); margin-top:2px; }
.bowler-card.sel .bowler-stat-label { color:var(--light); }
.bowler-fav { display:inline-block; font-size:10px; padding:2px 7px; border-radius:2px; font-weight:600; margin-left:6px; }
.bowler-fav.good { background:var(--green-pale); color:var(--green); }
.bowler-fav.bad { background:var(--red-pale); color:var(--red); }
.bowler-fav.neutral { background:var(--parchment); color:var(--mid); border:1px solid var(--border); }

/* Team editor */
.te-overlay { position:fixed; inset:0; background:var(--cream); z-index:90; overflow-y:auto; padding:12px 12px 80px; }
.te-header { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
.te-title { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; flex:1; }
.te-counters { display:flex; gap:8px; margin-bottom:12px; }
.te-counter { flex:1; padding:8px; border:1px solid var(--border); border-radius:var(--r); text-align:center; background:var(--parchment); }
.te-counter.warn { border-color:var(--red); background:var(--red-pale); }
.te-counter.ok { border-color:var(--green); background:var(--green-pale); }
.te-counter-label { font-size:8px; letter-spacing:.12em; text-transform:uppercase; color:var(--mid); margin-bottom:2px; }
.te-counter-val { font-family:'Playfair Display',serif; font-size:18px; font-weight:600; }
.player-card { background:var(--parchment); border:1px solid var(--border); border-radius:var(--r); padding:10px 12px; margin-bottom:8px; cursor:grab; user-select:none; }
.player-card.dragging { opacity:.4; border-style:dashed; }
.player-card.drag-over { border-color:var(--dark); border-style:solid; background:var(--cream); }
.player-card-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.player-pos { font-family:'Playfair Display',serif; font-size:16px; font-weight:600; color:var(--mid); min-width:20px; }
.player-name-input { flex:1; padding:5px 8px; border:1px solid var(--border); border-radius:var(--r); font-family:'Source Serif 4',serif; font-size:13px; background:var(--cream); }
.player-row { display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin-bottom:5px; }
.player-label { font-size:9px; color:var(--mid); min-width:52px; }
.star-stepper { display:flex; align-items:center; gap:4px; }
.star-btn { width:24px; height:24px; border:1px solid var(--border); border-radius:2px; background:var(--cream); cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; touch-action:manipulation; }
.star-btn:active { background:var(--dark); color:var(--cream); }
.star-count { font-family:'Playfair Display',serif; font-size:14px; min-width:16px; text-align:center; }
.seg-btn { padding:4px 8px; font-size:10px; border:1px solid var(--border); border-radius:2px; cursor:pointer; background:var(--cream); font-family:'Source Serif 4',serif; touch-action:manipulation; }
.seg-btn.active { background:var(--dark); color:var(--cream); border-color:var(--dark); }
.bowler-section { border-top:1px solid var(--border); margin-top:8px; padding-top:8px; }
.drag-handle { color:var(--light); font-size:16px; cursor:grab; padding:0 2px; }

/* Settings panel */
.settings-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:100; overflow-y:auto; padding:16px 12px 40px; }
.settings-panel { background:var(--cream); border-radius:var(--r); max-width:520px; margin:0 auto; padding:16px; }
.settings-title { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; margin-bottom:4px; }
.settings-sub { font-size:11px; color:var(--mid); margin-bottom:14px; }
.profile-tabs { display:flex; gap:6px; margin-bottom:14px; }
.profile-tab { flex:1; padding:8px; border:1px solid var(--border); border-radius:var(--r); cursor:pointer; text-align:center; font-family:'Playfair Display',serif; font-size:14px; background:var(--cream); touch-action:manipulation; }
.profile-tab.active { background:var(--dark); color:var(--cream); border-color:var(--dark); }
.profile-name-row { display:flex; gap:8px; align-items:center; margin-bottom:12px; }
.profile-name-input { flex:1; padding:7px 10px; border:1px solid var(--border); border-radius:var(--r); font-family:'Source Serif 4',serif; font-size:13px; background:var(--cream); }
.settings-section { font-size:8px; letter-spacing:.18em; text-transform:uppercase; color:var(--mid); border-bottom:1px solid var(--border); padding-bottom:4px; margin:12px 0 8px; }
.grid-table { width:100%; border-collapse:collapse; font-size:10px; margin-bottom:8px; }
.grid-table th { font-size:8px; letter-spacing:.1em; text-transform:uppercase; color:var(--mid); padding:3px 4px; text-align:center; font-weight:normal; }
.grid-table td { padding:2px 3px; text-align:center; }
.grid-table .row-label { font-size:9px; color:var(--mid); text-align:left; padding-right:6px; white-space:nowrap; }
.grid-input { width:36px; padding:3px 2px; border:1px solid var(--border); border-radius:2px; font-size:11px; text-align:center; font-family:'Source Serif 4',serif; background:var(--cream); }
.slider-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.slider-label { flex:1; font-size:11px; color:var(--ink); }
.slider-val { font-size:11px; font-family:'Playfair Display',serif; width:36px; text-align:right; color:var(--mid); }
input[type=range] { flex:1; accent-color:var(--dark); }
.settings-btns { display:flex; gap:6px; flex-wrap:wrap; margin-top:14px; }
.settings-btns .btn { flex:1; font-size:12px; padding:9px 8px; text-align:center; }

</style>
