<title>Pub Cricket Captain</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F5F0E8; --parchment: #EDE6D6; --dark: #1A1208; --ink: #2C2010;
  --mid: #6B5840; --light: #9B8B78; --border: #C8B89A;
  --green: #2D5016; --green-pale: #E8F0DF;
  --red: #7A1B1B; --red-pale: #F5E8E8;
  --gold: #8B6914; --gold-light: #C9A227; --gold-pale: #F5EDD6;
  --blue: #1A3A5C; --blue-pale: #E0EAF5;
  --r: 4px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  background: var(--cream); color: var(--ink);
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: 15px; line-height: 1.45;
}
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(0,0,0,.012) 40px,rgba(0,0,0,.012) 41px),
    repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(0,0,0,.012) 40px,rgba(0,0,0,.012) 41px);
}
.wrap { max-width: 520px; margin: 0 auto; padding: 12px 12px 80px; position: relative; z-index: 1; }

/* Masthead */
.mast { text-align:center; border-top:2px solid var(--dark); border-bottom:2px solid var(--dark); padding:8px 0 6px; margin-bottom:14px; }
.mast-sup { font-size:9px; letter-spacing:.2em; text-transform:uppercase; color:var(--mid); }
.mast-title { font-family:'Playfair Display',serif; font-size:26px; font-weight:700; color:var(--dark); line-height:1; }
.mast-sub { font-size:10px; color:var(--mid); font-style:italic; margin-top:2px; }

/* Cards */
.card { background:var(--parchment); border:1px solid var(--border); border-radius:var(--r); padding:10px 12px; margin-bottom:10px; }
.card-title { font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--mid); border-bottom:1px solid var(--border); padding-bottom:4px; margin-bottom:8px; }
.must-change { border-color:var(--red)!important; }
.must-change .card-title { color:var(--red)!important; }

/* Scoreboard */
.scoreboard { background:var(--dark); color:var(--cream); border-radius:var(--r); padding:10px 12px; display:grid; grid-template-columns:repeat(4,1fr); gap:4px; text-align:center; }
.sb-label { font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--light); margin-bottom:2px; }
.sb-val { font-family:'Playfair Display',serif; font-size:22px; font-weight:600; color:var(--cream); line-height:1; }
.sb-val.runs { color:#C9D8B6; } .sb-val.wkts { color:#E8B4A0; }
.sb-val.sm { font-size:12px; padding-top:4px; }

/* Log — sits beside scoreboard */
.log-box { background:var(--dark); border-radius:var(--r); padding:10px 12px; overflow-y:auto; }
.log-title { font-size:8px; letter-spacing:.18em; text-transform:uppercase; color:var(--light); margin-bottom:5px; }
.log-entry { font-size:13px; padding:2px 0; border-bottom:1px solid rgba(255,255,255,.06); color:#C8B89A; }
.log-entry:last-child { border-bottom:none; }
.log-entry.wkt { color:#E8B4A0; } .log-entry.boundary { color:#C9D8B6; font-style:italic; }
.log-entry.howzat { color:var(--gold-light); font-weight:600; }
.log-entry.review { color:#B8C8D8; font-style:italic; } .log-entry.over { color:var(--light); font-style:italic; font-size:12px; }

/* Commentary banner */
.commentary { background:var(--dark); color:var(--cream); border-radius:var(--r); padding:14px 16px; margin-bottom:10px; min-height:58px; display:flex; align-items:center; }
.comm-text { font-size:19px; font-family:'Playfair Display',serif; line-height:1.35; color:var(--cream); flex:1; }
.comm-text.boundary { color:#C9D8B6; }
.comm-text.wkt { color:#E8B4A0; }
.comm-text.howzat { color:var(--gold-light); }
.comm-text.over { color:var(--light); font-size:13px; font-style:italic; }
.comm-text.review { color:#B8C8D8; font-style:italic; }

/* Conditions bar */
.cond-bar { display:flex; gap:6px; align-items:center; background:var(--dark); color:var(--cream); border-radius:var(--r); padding:7px 12px; margin-bottom:10px; font-size:11px; flex-wrap:wrap; }
.cond-label { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--light); }
.cond-val { font-family:'Playfair Display',serif; font-size:12px; }
.cond-sep { color:var(--mid); }

/* Target banner */
.target-banner { display:flex; gap:12px; align-items:center; flex-wrap:wrap; border:1px solid var(--border); border-radius:var(--r); padding:10px 12px; margin-bottom:10px; background:linear-gradient(135deg,var(--green-pale),var(--parchment)); }
.target-score { font-family:'Playfair Display',serif; font-size:26px; font-weight:600; color:var(--green); }

/* Tags */
.tag { display:inline-block; font-size:11px; padding:2px 6px; border-radius:2px; font-weight:600; letter-spacing:.03em; }
.tag-green { background:var(--green-pale); color:var(--green); }
.tag-red { background:var(--red-pale); color:var(--red); }
.tag-gold { background:var(--gold-pale); color:var(--gold); }
.tag-mid { background:var(--parchment); color:var(--mid); border:1px solid var(--border); }

/* Buttons */
.btn { font-family:'Source Serif 4',serif; border-radius:var(--r); cursor:pointer; transition:all .12s; border:1px solid var(--border); background:var(--cream); color:var(--ink); font-size:13px; padding:9px 16px; touch-action:manipulation; }
.btn:active:not(:disabled) { transform:scale(.97); }
.btn:disabled { opacity:.35; cursor:not-allowed; }
.btn-primary { background:var(--dark); color:var(--cream); border-color:var(--dark); font-size:15px; padding:12px 32px; width:100%; }
.btn-danger { background:var(--red-pale); color:var(--red); border-color:var(--red); }
.btn-danger:active:not(:disabled) { background:var(--red); color:#fff; }
.btn-gold { background:var(--gold-pale); color:var(--gold); border-color:var(--gold); }
.btn-gold:active:not(:disabled) { background:var(--gold); color:#fff; }
.btn-green { background:var(--green-pale); color:var(--green); border-color:var(--green); font-size:14px; padding:11px 24px; width:100%; }
.btn-green:active:not(:disabled) { background:var(--green); color:#fff; }
.btn-sm { font-size:13px; padding:7px 14px; }

/* Bowler buttons */
.b-grid { display:flex; gap:5px; flex-wrap:wrap; }
.b-btn { padding:6px 10px; font-size:11px; border:1px solid var(--border); border-radius:var(--r); cursor:pointer; background:var(--cream); color:var(--ink); font-family:'Source Serif 4',serif; touch-action:manipulation; }
.b-btn.sel { background:var(--dark); color:var(--cream); border-color:var(--dark); }
.b-btn:disabled { opacity:.35; cursor:not-allowed; }
.b-meta { font-size:8px; color:var(--mid); text-align:center; margin-top:2px; }

/* Field buttons */
.f-btn { flex:1; padding:8px 4px; font-size:12px; border:1px solid var(--border); border-radius:var(--r); cursor:pointer; background:var(--cream); color:var(--ink); font-family:'Source Serif 4',serif; touch-action:manipulation; text-align:center; }
.f-btn.attacking.sel { background:var(--red-pale); border-color:var(--red); color:var(--red); font-weight:600; }
.f-btn.balanced.sel  { background:var(--green-pale); border-color:var(--green); color:var(--green); font-weight:600; }
.f-btn.defensive.sel { background:var(--blue-pale); border-color:var(--blue); color:var(--blue); font-weight:600; }

/* Over pips */
.pips { display:flex; gap:4px; margin-top:5px; }
.pip { width:11px; height:11px; border-radius:50%; background:var(--border); }
.pip.done { background:var(--mid); } .pip.wkt { background:var(--red); } .pip.boundary { background:var(--green); }

/* Batsmen grid — 2 col on mobile */
.bat-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
.bat-card { padding:6px 8px; border:1px solid var(--border); border-radius:var(--r); font-size:11px; background:var(--cream); }
.bat-card.active { border-color:var(--dark); background:var(--dark); color:var(--cream); }
.bat-card.out { opacity:.35; }
.bat-name { font-family:'Playfair Display',serif; font-size:12px; font-weight:600; }
.bat-card.active .bat-info { color:var(--light); }
.bat-info { font-size:11px; color:var(--mid); margin-top:1px; }

/* Stars */
.stars { color:var(--gold-light); font-size:10px; letter-spacing:1px; }

/* Umpires */
.ump-row { display:flex; gap:6px; }
.ump-card { flex:1; padding:7px 9px; border:1px solid var(--border); border-radius:var(--r); }
.ump-card.active { border-color:var(--dark); background:var(--dark); color:var(--cream); }
.ump-name { font-family:'Playfair Display',serif; font-size:12px; font-weight:600; }
.ump-card.active .ump-stat { color:var(--light); }
.ump-stat { font-size:11px; color:var(--mid); margin-top:1px; }

/* Die */
.die-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:10px; }
.die-wrap { text-align:center; }
.die { width:52px; height:52px; border:1.5px solid var(--border); border-radius:var(--r); display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-size:20px; font-weight:600; background:var(--cream); }
.die.active { border-color:var(--dark); background:var(--dark); color:var(--cream); }
.die.wkt { border-color:var(--red); background:var(--red-pale); color:var(--red); }
.die.boundary { border-color:var(--green); background:var(--green-pale); color:var(--green); }
.die.howzat { border-color:var(--gold); background:var(--gold-pale); color:var(--gold); }
.die-label { font-size:8px; color:var(--mid); margin-top:2px; text-transform:uppercase; letter-spacing:.06em; }

/* Bars */
.bar-track { height:3px; border-radius:2px; background:var(--border); overflow:hidden; margin-top:3px; }
.bar-fill { height:100%; border-radius:2px; transition:width .3s; }

/* Pending */
.pending-box { border:1px solid var(--gold); border-radius:var(--r); padding:10px 12px; margin-bottom:10px; background:var(--gold-pale); }
.pending-title { font-family:'Playfair Display',serif; font-size:14px; font-weight:600; color:var(--gold); margin-bottom:3px; }
.pending-sub { font-size:11px; color:var(--ink); margin-bottom:8px; }
.pending-btns { display:flex; gap:6px; flex-wrap:wrap; }
.pending-btns .btn { flex:1; font-size:12px; padding:8px 8px; text-align:center; }

/* Result banners */
.result-banner { text-align:center; padding:16px; border-radius:var(--r); margin-bottom:12px; }
.result-win  { background:var(--green-pale); border:1px solid var(--green); color:var(--green); }
.result-loss { background:var(--red-pale);   border:1px solid var(--red);   color:var(--red); }
.result-tie  { background:var(--blue-pale);  border:1px solid var(--blue);  color:var(--blue); }
.result-title { font-family:'Playfair Display',serif; font-size:18px; font-weight:600; }
.innings-banner { text-align:center; padding:14px; border:1px solid var(--border); border-radius:var(--r); margin-bottom:10px; background:var(--parchment); }

/* Setup screens */
.setup { text-align:center; padding:10px 0; }
.setup-title { font-family:'Playfair Display',serif; font-size:20px; font-weight:600; margin-bottom:5px; }
.setup-sub { font-size:12px; color:var(--mid); margin-bottom:18px; font-style:italic; }
.coin { width:76px; height:76px; border-radius:50%; background:var(--dark); color:var(--cream); display:flex; align-items:center; justify-content:center; font-size:28px; margin:0 auto 18px; border:3px solid var(--gold-light); cursor:pointer; box-shadow:0 4px 16px rgba(0,0,0,.2); touch-action:manipulation; }
.coin.spin { animation:coinSpin .6s ease-out; }
@keyframes coinSpin { 0%{transform:rotateY(0)} 50%{transform:rotateY(360deg) scale(1.1)} 100%{transform:rotateY(720deg)} }
.choice-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; max-width:360px; margin-left:auto; margin-right:auto; }
.choice-card.sel { border-color:var(--gold-light);background:var(--gold-pale); }
.choice-card { padding:12px 8px; border:1px solid var(--border); border-radius:var(--r); cursor:pointer; background:var(--cream); text-align:center; transition:all .1s; touch-action:manipulation; }
.choice-card:active { border-color:var(--dark); background:var(--dark); color:var(--cream); }
.cc-icon { font-size:22px; margin-bottom:5px; }
.cc-name { font-family:'Playfair Display',serif; font-size:13px; font-weight:600; margin-bottom:2px; }
.cc-desc { font-size:10px; color:var(--mid); line-height:1.3; }

/* Info row */
.info-row { display:flex; gap:5px; align-items:center; flex-wrap:wrap; margin-top:6px; font-size:10px; color:var(--mid); }

/* Bowler select screen */
.bowler-overlay { position:fixed; inset:0; background:var(--cream); z-index:95; overflow-y:auto; padding:12px 12px 80px; }
.bowler-card { background:var(--parchment); border:1px solid var(--border); border-radius:var(--r); padding:14px 16px; margin-bottom:10px; cursor:pointer; touch-action:manipulation; }
.bowler-card.sel { border-color:var(--dark); background:var(--dark); color:var(--cream); }
.bowler-card.used { opacity:.35; pointer-events:none; }
.bowler-card.locked { opacity:.5; pointer-events:none; }
.bowler-card-name { font-family:'Playfair Display',serif; font-size:19px; font-weight:600; margin-bottom:3px; }
.bowler-card-detail { font-size:13px; color:var(--mid); margin-bottom:8px; }
.bowler-card.sel .bowler-card-detail { color:var(--light); }
.bowler-card-stats { display:flex; gap:20px; }
.bowler-stat-val { font-family:'Playfair Display',serif; font-size:18px; font-weight:600; line-height:1; }
.bowler-stat-label { font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--mid); margin-top:2px; }
.bowler-card.sel .bowler-stat-label { color:var(--light); }
.bowler-fav { display:inline-block; font-size:10px; padding:2px 7px; border-radius:2px; font-weight:600; margin-left:6px; }
.bowler-fav.good { background:var(--green-pale); color:var(--green); }
.bowler-fav.bad { background:var(--red-pale); color:var(--red); }
.bowler-fav.neutral { background:var(--parchment); color:var(--mid); border:1px solid var(--border); }

/* Team editor */
.te-overlay { position:fixed; inset:0; background:var(--cream); z-index:90; overflow-y:auto; padding:12px 12px 80px; }
.te-header { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
.te-title { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; flex:1; }
.te-counters { display:flex; gap:8px; margin-bottom:12px; }
.te-counter { flex:1; padding:8px; border:1px solid var(--border); border-radius:var(--r); text-align:center; background:var(--parchment); }
.te-counter.warn { border-color:var(--red); background:var(--red-pale); }
.te-counter.ok { border-color:var(--green); background:var(--green-pale); }
.te-counter-label { font-size:8px; letter-spacing:.12em; text-transform:uppercase; color:var(--mid); margin-bottom:2px; }
.te-counter-val { font-family:'Playfair Display',serif; font-size:18px; font-weight:600; }
.player-card { background:var(--parchment); border:1px solid var(--border); border-radius:var(--r); padding:10px 12px; margin-bottom:8px; cursor:grab; user-select:none; }
.player-card.dragging { opacity:.4; border-style:dashed; }
.player-card.drag-over { border-color:var(--dark); border-style:solid; background:var(--cream); }
.player-card-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.player-pos { font-family:'Playfair Display',serif; font-size:16px; font-weight:600; color:var(--mid); min-width:20px; }
.player-name-input { flex:1; padding:5px 8px; border:1px solid var(--border); border-radius:var(--r); font-family:'Source Serif 4',serif; font-size:13px; background:var(--cream); }
.player-row { display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin-bottom:5px; }
.player-label { font-size:9px; color:var(--mid); min-width:52px; }
.star-stepper { display:flex; align-items:center; gap:4px; }
.star-btn { width:24px; height:24px; border:1px solid var(--border); border-radius:2px; background:var(--cream); cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; touch-action:manipulation; }
.star-btn:active { background:var(--dark); color:var(--cream); }
.star-count { font-family:'Playfair Display',serif; font-size:14px; min-width:16px; text-align:center; }
.seg-btn { padding:4px 8px; font-size:10px; border:1px solid var(--border); border-radius:2px; cursor:pointer; background:var(--cream); font-family:'Source Serif 4',serif; touch-action:manipulation; }
.seg-btn.active { background:var(--dark); color:var(--cream); border-color:var(--dark); }
.bowler-section { border-top:1px solid var(--border); margin-top:8px; padding-top:8px; }
.drag-handle { color:var(--light); font-size:16px; cursor:grab; padding:0 2px; }

/* Settings panel */
.settings-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:100; overflow-y:auto; padding:16px 12px 40px; }
.settings-panel { background:var(--cream); border-radius:var(--r); max-width:520px; margin:0 auto; padding:16px; }
.settings-title { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; margin-bottom:4px; }
.settings-sub { font-size:11px; color:var(--mid); margin-bottom:14px; }
.profile-tabs { display:flex; gap:6px; margin-bottom:14px; }
.profile-tab { flex:1; padding:8px; border:1px solid var(--border); border-radius:var(--r); cursor:pointer; text-align:center; font-family:'Playfair Display',serif; font-size:14px; background:var(--cream); touch-action:manipulation; }
.profile-tab.active { background:var(--dark); color:var(--cream); border-color:var(--dark); }
.profile-name-row { display:flex; gap:8px; align-items:center; margin-bottom:12px; }
.profile-name-input { flex:1; padding:7px 10px; border:1px solid var(--border); border-radius:var(--r); font-family:'Source Serif 4',serif; font-size:13px; background:var(--cream); }
.settings-section { font-size:8px; letter-spacing:.18em; text-transform:uppercase; color:var(--mid); border-bottom:1px solid var(--border); padding-bottom:4px; margin:12px 0 8px; }
.grid-table { width:100%; border-collapse:collapse; font-size:10px; margin-bottom:8px; }
.grid-table th { font-size:8px; letter-spacing:.1em; text-transform:uppercase; color:var(--mid); padding:3px 4px; text-align:center; font-weight:normal; }
.grid-table td { padding:2px 3px; text-align:center; }
.grid-table .row-label { font-size:9px; color:var(--mid); text-align:left; padding-right:6px; white-space:nowrap; }
.grid-input { width:36px; padding:3px 2px; border:1px solid var(--border); border-radius:2px; font-size:11px; text-align:center; font-family:'Source Serif 4',serif; background:var(--cream); }
.slider-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.slider-label { flex:1; font-size:11px; color:var(--ink); }
.slider-val { font-size:11px; font-family:'Playfair Display',serif; width:36px; text-align:right; color:var(--mid); }
input[type=range] { flex:1; accent-color:var(--dark); }
.settings-btns { display:flex; gap:6px; flex-wrap:wrap; margin-top:14px; }
.settings-btns .btn { flex:1; font-size:12px; padding:9px 8px; text-align:center; }

<div class="wrap" id="app"></div>
<script>
window.onerror=function(msg,src,line,col,err){
  const div=document.createElement('div');
  div.style.cssText='position:fixed;top:0;left:0;right:0;background:#7A1B1B;color:#fff;padding:10px;font-size:11px;font-family:monospace;z-index:99999;white-space:pre-wrap;';
  div.textContent='ERROR: '+msg+'\nLine: '+line+' Col: '+col+'\n'+(err&&err.stack?err.stack.split('\n').slice(0,4).join('\n'):'');
  document.body.appendChild(div);
  return false;
};

// ═══════════════════════════════════════
// MULTIPLAYER
// ═══════════════════════════════════════
let mp = {
  active: false,      // are we in multiplayer mode?
  role: null,         // 'host' or 'guest'
  roomCode: null,     // 4-letter code
  unsubscribe: null,  // Firebase listener cleanup
};

function mpRoomPath(code){ return 'games/' + code.toUpperCase(); }

function generateRoomCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ'; // no I/O confusion
  let code='';
  for(let i=0;i<4;i++) code+=chars[Math.floor(Math.random()*chars.length)];
  return code;
}

async function mpCreateRoom(){
  if(!window._firebaseDB){
    // Wait up to 3 seconds for Firebase to initialise
    let attempts=0;
    while(!window._firebaseDB && attempts<30){ await new Promise(r=>setTimeout(r,100)); attempts++; }
    if(!window._firebaseDB){ alert('Firebase not ready — please refresh and try again'); return; }
  }
  const code = generateRoomCode();
  mp.active=true; mp.role='host'; mp.roomCode=code;
  // Write initial state
  await mpPush();
  // Subscribe to changes (host renders on remote changes too, e.g. guest sets mentality)
  mpSubscribe();
  render();
}

async function mpJoinRoom(code){
  if(!window._firebaseDB){
    let attempts=0;
    while(!window._firebaseDB && attempts<30){ await new Promise(r=>setTimeout(r,100)); attempts++; }
    if(!window._firebaseDB){ alert('Firebase not ready — please refresh'); return; }
  }
  code = code.toUpperCase().trim();
  if(code.length!==4){ alert('Enter a 4-letter room code'); return; }
  // Check room exists
  const snap = await window._firebaseGet(window._firebaseRef_fn(window._firebaseDB, mpRoomPath(code)));
  if(!snap.exists()){ alert('Room not found — check the code'); return; }
  mp.active=true; mp.role='guest'; mp.roomCode=code;
  // Load state from host
  const data = snap.val();
  if(data.st) st = data.st;
  if(data.matchTeams) matchTeams = data.matchTeams;
  // Flag to host that guest has joined
  try{
    await window._firebaseSet(
      window._firebaseRef_fn(window._firebaseDB, mpRoomPath(code)+'/guestJoined'),
      true
    );
  }catch(e){ console.warn('Guest flag failed:', e); }
  // Subscribe to live updates
  mpSubscribe();
  render();
}

function mpSubscribe(){
  if(mp.unsubscribe) mp.unsubscribe();
  const dbRef = window._firebaseRef_fn(window._firebaseDB, mpRoomPath(mp.roomCode));
  const unsub = window._firebaseOnValue(dbRef, (snap)=>{
    if(!snap.exists()) return;
    const data = snap.val();
    // Only apply remote changes if they came from the other player
    // (we don't overwrite our own just-saved state)
    if(data.st) st = data.st;
    if(data.matchTeams) matchTeams = data.matchTeams;
    renderOnly(); // render without saving back to Firebase
  });
  mp.unsubscribe = unsub;
}

async function mpPush(){
  if(!mp.active||!window._firebaseDB) return;
  try{
    await window._firebaseSet(
      window._firebaseRef_fn(window._firebaseDB, mpRoomPath(mp.roomCode)),
      { st: st, matchTeams: matchTeams, ts: Date.now() }
    );
  }catch(e){ console.warn('Firebase push failed:', e); }
}

function mpLeave(){
  if(mp.unsubscribe) mp.unsubscribe();
  mp={active:false,role:null,roomCode:null,unsubscribe:null};
  render();
}

// Role helpers
function mpIsHost(){ return !mp.active || mp.role==='host'; }
function mpIsGuest(){ return mp.active && mp.role==='guest'; }
// Host controls bowling, guest controls batting (and vice versa if guest bats first)
// In 2P: host always bowls first innings, guest bats first innings
// The bowler sees bowling screen, batter sees batting screen
function mpGetScreen(){
  if(!mp.active) return st.gameScreen; // local game — use as-is
  // Host = bowling screen, Guest = batting screen (for commentary both see commentary)
  if(st.gameScreen==='commentary') return 'commentary';
  if(mp.role==='host') return 'bowling';
  if(mp.role==='guest') return 'batting';
  return st.gameScreen;
}

let matchHistory = [];

function loadHistory(){
  try{ const s=localStorage.getItem('cricket_history'); if(s) matchHistory=JSON.parse(s); }catch(e){}
}
function saveHistory(){
  try{ localStorage.setItem('cricket_history', JSON.stringify(matchHistory)); }catch(e){}
}
function clearHistory(){
  matchHistory=[];
  saveHistory();
  render();
}
loadHistory();

function recordMatchResult(){
  if(st.innings!==2||st.team1Score===null||!st.done) return;
  // Avoid double-recording
  if(st._historyRecorded) return;
  st._historyRecorded=true;

  const t1=getMatchTeam(1), t2=getMatchTeam(2);
  const result=getMatchResult();
  const entry={
    date: new Date().toISOString(),
    team1: t1.name, team2: t2.name,
    pitch: st.pitchId, weather: st.weatherId,
    profile1: st.profileInnings1||'A', profile2: st.profileInnings2||'A',
    inn1runs: st.team1Score, inn1wkts: st.team1Wickets,
    inn2runs: st.runs, inn2wkts: st.wickets,
    result: result ? result.text : 'Unknown',
    resultCls: result ? result.cls : '',
  };
  matchHistory.unshift(entry);
  if(matchHistory.length>50) matchHistory=matchHistory.slice(0,50);
  saveHistory();
}

function migrateProfiles(){
  ['A'].forEach(k=>{
    const p=profiles[k];
    if(!p){profiles[k]=makeProfile('Settings',DEFAULT_HOWZAT,DEFAULT_NOTOUT,DEFAULT_MODS);return;}
    ['howzat','notout'].forEach(tbl=>{
      if(!p[tbl])return;
      p[tbl]=p[tbl].map((starRow,si)=>
        starRow.map((pitchRow,pi)=>{
          const def=tbl==='howzat'?DEFAULT_HOWZAT:DEFAULT_NOTOUT;
          while(pitchRow.length<4) pitchRow.push(def[si][pi][pitchRow.length]);
          return pitchRow;
        })
      );
    });
    Object.keys(DEFAULT_MODS).forEach(key=>{
      if(p.mods[key]===undefined) p.mods[key]=DEFAULT_MODS[key];
    });
  });
}

function rnd(arr){return arr[Math.floor(Math.random()*arr.length)];}
function pct(n){return Math.random()<Math.max(0,Math.min(1,n/100));}
function starRating(n,max=5){return '★'.repeat(n)+'☆'.repeat(max-n);}
function weightedRnd(arr){
  const total=arr.reduce((s,x)=>s+x.weight,0);
  let r=Math.random()*total;
  for(const x of arr){r-=x.weight;if(r<=0)return x;}
  return arr[arr.length-1];
}

function getOverType(){return st.over<=5?'fast':'spin';}

// Per-star howzat cap — better batsmen have a lower ceiling on dismissal chance
// Concentrates wickets in the tail where they belong
function getHowzatCap(batStars){
  switch(batStars){
    case 5: return 50;
    case 4: return 55;
    case 3: return 65;
    case 2: return 75;
    case 1: return 85;
    default:return 65;
  }
}

function getFieldFatigue(){
  const f=st.field, streak=st.fieldStreak.id===f?st.fieldStreak.count:0;
  const thresh=getMod('defFatigueThresh');
  const fo=Math.max(0,streak-thresh);
  const dm=getMod('defFatigueMod')/100, am=getMod('attFatigueMod')/100;
  if(f==='defensive')return{howzatMod:Math.max(.3,1-fo*dm),runMod:Math.min(1.20,1+fo*dm),label:fo>0?'Def. fatigue':''};
  if(f==='attacking')return{howzatMod:Math.max(0.7,1-fo*am),runMod:1,label:fo>0?`Field worn in`:''};
  return{howzatMod:1,runMod:1,label:''};
}
function getRunFaces(){
  const f=st.field,fat=getFieldFatigue(),w=st.weatherId;
  const bwl=st.bowler?getBowlersForInnings().find(b=>b.id===st.bowler):null;
  const isMedium=bwl&&bwl.type==='medium';

  // Minefield: uneven bounce, variable grip — boundaries rare, six almost never
  if(st.pitchId==='minefield'){
    if(f==='attacking') return[0,1,1,2,2,4];
    if(f==='defensive') return[0,0,0,1,2,2];
    return[0,0,1,1,2,4];
  }

  // Damp: sluggish outfield, difficult grip — mostly 0,1,2 with rare boundaries
  if(w==='damp'){
    if(f==='attacking')return[0,1,1,2,2,4];
    if(f==='defensive')return[0,0,1,1,1,2];
    return[0,0,1,1,2,4];
  }
  // Hot: ball bounces true, slightly easier to hit boundaries
  if(w==='hot'){
    if(f==='attacking')return[1,2,4,6,6,6];
    if(f==='defensive')return[0,0,1,2,2,4];
    return[0,1,2,4,6,6];
  }
  // Medium pace: harder to score boundaries regardless of field
  if(isMedium){
    if(f==='attacking')return[0,1,2,4,4,6];
    if(f==='defensive')return[0,0,0,1,1,2];
    return[0,0,1,1,2,4];
  }
  if(f==='attacking')return[1,2,4,6,6,6];
  if(f==='defensive'){
    if(fat.runMod>1.3)return[0,0,1,2,2,4];
    if(fat.runMod>1.15)return[0,0,0,1,2,4];
    return[0,0,0,1,1,4];
  }
  return[0,1,2,4,4,6];
}
function getBowlerStarsMod(bwl){
  const ot=getOverType(),bat=st.batsmen[st.activeBat[0]];
  let wm=1.0;
  const fb=getMod('fastOverBonus')/100, wp=getMod('wrongOverPen')/100;
  const ha=getMod('handAngle')/100;

  // Over type modifiers (fast/spin only)
  if(bwl.type==='fast'  &&ot==='fast') wm*=1+fb;
  if(bwl.type==='spin'  &&ot==='spin') wm*=1+fb;
  if(bwl.type==='fast'  &&ot==='spin') wm*=1-wp;
  if(bwl.type==='spin'  &&ot==='fast') wm*=1-wp;
  // Medium pace: no % modifier — handled via effective star adjustments in getInherentBonus

  // Hand angle
  if(bwl.hand!==bat.hand) wm*=1+ha;

  const vm=bwl.type==='spin'?bat.vs_spin:bat.vs_fast;
  wm/=vm;
  return Math.min(1.5,wm);
}

function getSpecialistMult(bwl){

    default: return 1;

}

// Inherent type bonuses — star adjustments based on bowler type and conditions
function getInherentBonus(bwl){
  let bonus = 0;

  // Spinners naturally thrive on a crumbling minefield
  if(bwl.type==='spin' && st.pitchId==='minefield') bonus += 1;

  // Medium pace: context-dependent star adjustments
  if(bwl.type==='medium'){
    const isFinisher = bwl.speciality==='finisher';
    if(st.over<=3)                        bonus -= 1; // too easy to play early on
    if(st.over>=9 && !isFinisher)         bonus -= 1; // not threatening at death
    // (if isFinisher in overs 9-10, getSpecialistBonus gives +1 separately — no death penalty)
    if(st.weatherId==='damp')             bonus += 1; // heavy ball swings nicely
  }

  return bonus;
}

// Mentality run faces
function getMentalityRunFaces(mentality, field){
  const bat = st.batsmen[st.activeBat[0]];

  // Minefield overrides all mentality run faces — pitch dictates
  // Defensive mentality gets its own safer tables — hard work, no sixes
  if(st.pitchId==='minefield'){
    if(mentality==='defensive') return field==='attacking'?[0,0,1,1,2,4]:field==='defensive'?[0,0,0,1,1,2]:[0,0,1,1,2,2];
    if(field==='attacking') return[0,1,1,2,2,4];
    if(field==='defensive') return[0,0,0,1,2,2];
    return[0,0,1,1,2,4];
  }

  // Tail always uses TAIL_RUNS — their doom is their 1-star howzat, not mentality
  if(bat.stars===1){
    return TAIL_RUNS[field] || TAIL_RUNS.balanced;
  }
  // Last over — use elevated faces if available for this mentality
  if(st.over>=10 && LAST_OVER_RUNS[mentality]){
    const lastTable = LAST_OVER_RUNS[mentality];
    return lastTable[field] || lastTable.balanced;
  }
  const table = MENTALITY_RUNS[mentality];
  if(!table) return getRunFaces();
  return table[field] || table.balanced;
}

// Mentality controls dismissal risk, field controls wicket pressure independently
// v9 calibrated: mentality×field hz lookup table
// Replaces blind multiplication — each combination tuned independently
// Validated against 5,000-innings full-fidelity sim (config R)
const MENTALITY_FIELD_HZ = {

  const base = (MENTALITY_FIELD_HZ[mentality]?.[st.field]) ?? 1.0;
  // Last over — aggressive/positive batsmen take more risks
  if(st.over>=10){
    return base * (LAST_OVER_HZ_MULT[mentality] ?? 1.0);
  }
  return base;
}
function getMineFieldMentalityMod(mentality){
  // On a minefield, mentality choice is critical
  if(st.pitchId !== 'minefield') return 1.0;
  switch(mentality){
    case 'defensive': return 0.70; // reading it perfectly — significant buff
    case 'rotation':  return 0.85; // sensible — small buff
    case 'positive':  return 1.15; // risky on a bad pitch
    case 'aggressive':return 1.40; // genuinely dangerous
    default:          return 1.0;
  }

function getRecklessAggressivePenalty(bat, mentality, over){
  if(mentality !== 'aggressive') return 0;
  const s = bat.batSpecialism || 'none';
  const bowler = getBowlersForInnings().find(b=>b.id===st.bowler);
  // Legitimate aggressive specialists
  if(s === 'big_hitter') return 0;
  if(s === 'closer' && over >= 9) return 0;
  if(s === 'vs_fast' && bowler && bowler.type === 'fast') return 0;
  if(s === 'vs_spin' && bowler && bowler.type === 'spin') return 0;
  // No justification for aggression — reckless
  return 5;
}

// Bat specialism howzat modifier for striker
function getBatSpecialismMod(bat, bwl, over){
  switch(bat.batSpecialism){
    case 'vs_fast': return bwl.type==='fast'?0.80:1.0;
    case 'vs_spin': return bwl.type==='spin'?0.80:1.0;
    case 'big_hitter': return 1.10; // slightly easier to dismiss but hits harder
    case 'closer': return (over>=8)?0.82:1.0;
    case 'rotation': return 0.90; // hard to dismiss, plays sensibly
    case 'lower_order': return 1.0; // buff is in strike protection and mentality mod
    default: return 1.0;

}
function getBatSpecialismMentalityMod(bat, mentality, over){
  const s=bat.batSpecialism;
  if(s==='rotation'){
    if(mentality==='rotation') return -10;
    if(mentality==='aggressive') return +8;
  }
  if(s==='big_hitter'){
    if(mentality==='aggressive') return -8;
    if(mentality==='defensive') return +10;
  }
  if(s==='closer'){
    if(over>=8 && (mentality==='aggressive'||mentality==='positive')) return -8;
    if(over<8  && mentality==='aggressive') return +8;
  }
  if(s==='lower_order'){
    if(mentality==='defensive') return -12;
    if(mentality==='aggressive') return +15;
  }
  return 0;
}

// Is striker a lower order batsman (position 6+)?
function isLowerOrder(bat){ return bat.position>=6; }

// Strike rotation: does the striker protect the tail?
// If striker has rotation specialism and non-striker is lower order,
// attempt to score odd runs on last ball or even runs generally
function shouldAttemptRotation(){
  const striker=st.batsmen[st.activeBat?.[0]];
  const nonStriker=st.batsmen[st.activeBat?.[1]];
  if(!striker||!nonStriker) return false;
  return isStrikeRotator(striker) && isLowerOrder(nonStriker);
}

function getDotBallPct(){return getMod('dotBallPct');}

// Batsman confidence: builds per ball faced with same field setting
// +1 per ball, capped at 20. Resets on field change or new batsman.
// Effect: run face bias shifts up, not-out chance increases
function getConfidenceRunBonus(){
  // Every 6 confidence points shift runs slightly (was every 4 — reduced to limit inflation)
  return Math.floor(st.batConfidence/6);
}
function getConfidenceNotOutBonus(){
  // +1% not-out per 2 confidence points, max +8%
  return Math.min(8, Math.floor(st.batConfidence/2));
}
function getFieldNotOutBonus(){return st.fieldStreak.id===st.field?st.fieldStreak.count:0;}
function getFieldGamingPenalty(){
  // If bowler has changed field 2+ times against same batsman this over,
  // batsman has clocked the tactics — harder to dismiss, more likely to find gaps
  const strikerId=st.activeBat?.[0];
  if(strikerId==null) return {howzat:0, runBonus:false};
  const changes=st.fieldChangesVsBat[strikerId]||0;
  if(changes>=2) return {howzat:-5, runBonus:true};
  return {howzat:0, runBonus:false};
}
function getUmpireOut(ump){return Math.random()<ump.strength/6;}
// v9: defensive notout bonus is field-aware
// Attacking field = no survival bonus (can't play defensively when fielders are up)
// Balanced field = partial bonus
// Defensive field = full bonus (set field rewards patient play)
const DEF_NOTOUT_BY_FIELD = {attacking:1.00, balanced:1.25, defensive:1.50};
function getWicketDecayBonus(){ return st.wicketDecayBuff||0; }

function rollNotOut(bat){
  const mentality = getStrikerMentality();
  // Style/mentality match bonus — +10% not-out when batter plays to their natural style
  const styleMatchBonus = (bat.style && bat.style.toLowerCase() === mentality) ? 10 : 0;
  let notOutPct = getNotOutPct(bat.stars)+getFieldNotOutBonus()+getConfidenceNotOutBonus()+getWicketDecayBonus()+styleMatchBonus;
  if(mentality==='defensive'){
    notOutPct *= (DEF_NOTOUT_BY_FIELD[st.field] ?? 1.25);
  }
  return pct(Math.min(95, notOutPct));
}
// Flavour text for not-out decisions by dismissal type
// Returns {referral, verdict} for Caught (two-step), or {referral} for others
function getNotOutFlavour(dtype, umpName, thirdUmpName){
  switch(dtype){
    case 'Caught':{
      const referrals=[
        `Did the fielder take it cleanly? ${umpName} has sent it upstairs!`,
        `Did it carry? ${umpName} is unsure — it's going to the third umpire!`,
        `${umpName} can't be sure — did the ball bounce before the fielder gathered? Upstairs!`,
        `${umpName} hesitates — did the fielder get their fingers under it in time? It's referred!`,
        `DROPPED! ${umpName} signals not out — a costly spill`,
      ];
      const verdicts=[
        `${thirdUmpName}: Not out — the ball grounded just before the fielder`,
        `${thirdUmpName}: Not out — it fell just short`,
        `${thirdUmpName}: Not out — the replays show it bounced`,
        `${thirdUmpName}: Not out — the ball touched the turf`,
      ];
      return {
        referral: referrals[Math.floor(Math.random()*referrals.length)],
        verdict:  verdicts[Math.floor(Math.random()*verdicts.length)],
      };
    }
    case 'Caught Behind':
      return {referral: [
        `${umpName} shakes their head — was there an edge?`,
        `${umpName}: Not out. Did the ball brush the pad rather than the bat?`,
        `${umpName} turns it down — was there anything on it?`,
        `${umpName}: Not out. Did it clip the arm on the way through?`,
      ][Math.floor(Math.random()*4)]};
    case 'LBW':
      return {referral: [
        `${umpName}: Not out — did it pitch outside leg?`,
        `${umpName}: Not out — was it going over the stumps?`,
        `${umpName}: Not out — did it strike outside the line of off stump?`,
        `${umpName}: Not out — did bat hit ball first?`,
        `${umpName}: Not out — was the impact just outside off?`,
      ][Math.floor(Math.random()*5)]};
    default:
      return {referral:`${umpName}: Not out`};
  }
}
function getDismissalFlavour(batRuns){
  if(batRuns>=50) return 'Walk off head held high';
  if(batRuns>=30) return 'March back to the changing room';
  if(batRuns>=15) return 'Walk back to the rooms';
  return 'Trudge back to the shed';
}

function rollBat(){
  if(st.done||st.matchOver)return;
  if(!st.bowler){addLog('Select a bowler first','over');render();return;}
  if(st.pendingDismissal){addLog('Resolve pending decision first','over');render();return;}
  if(st.mustChangeBowler){addLog('Must change bowler!','over');render();return;}
  if(st.pendingWicket){addLog('Choose next batsman first','over');render();return;}

  // CPU makes decisions before each ball
  applyCpuBowlerIfNeeded();
  applyCpuFieldIfNeeded();
  applyCpuMentalityIfNeeded();

  // ── FREE HIT ──
  if(st.freeHit){
    const bwlFH=getBowlersForInnings().find(b=>b.id===st.bowler);
    const batFH=st.batsmen[st.activeBat[0]];
    if(!bwlFH||!batFH){addLog('No batsman — innings over','over');render();return;}
    addLog(`🟡 FREE HIT ball — ${batFH.name} can only be dismissed by run-out!`,'boundary');
    st.freeHit=false;
    // Very small howzat chance — run-out only
    if(Math.random()<0.04){
      addLog(`${batFH.name} — RUN OUT attempting a cheeky single on the free hit!`,'howzat');
      advanceBall('wkt');
      dismissBatsman('Run Out','');
      checkChase();render();return;
    }
    // Free hit run face: explosive [2,4,4,6,6,6]
    const fhFaces=[2,4,4,6,6,6];
    let fhRuns=fhFaces[Math.floor(Math.random()*fhFaces.length)];
    st.runs+=fhRuns; batFH.runs+=fhRuns; batFH.balls++;
    if(!st.bowlStats[bwlFH.id]) st.bowlStats[bwlFH.id]={balls:0,runs:0,wkts:0};
    st.bowlStats[bwlFH.id].balls++;
    st.bowlStats[bwlFH.id].runs+=fhRuns;
    let _fhMilestone=null;
    if(batFH.runs>=100&&batFH.runs-fhRuns<100) _fhMilestone=`${batFH.name} raises the bat — ONE HUNDRED! The crowd rise as one.`;
    else if(batFH.runs>=50&&batFH.runs-fhRuns<50) _fhMilestone=`${batFH.name} raises the bat — fifty up!`;
    const fhMsg=fhRuns>=6?`${batFH.name}: SIX! Free hit maximum!`:fhRuns>=4?`${batFH.name}: FOUR! Free hit boundary!`:`${batFH.name}: ${fhRuns} run${fhRuns!==1?'s':''} off the free hit`;
    addLog(fhMsg,fhRuns>=4?'boundary':'');
    if(_fhMilestone) addLog(_fhMilestone,'boundary');
    const isLastBallFH=st.ball===5;
    if(fhRuns%2===1&&!isLastBallFH){
      if(st.activeBat?.length>=2)st.activeBat=[st.activeBat[1],st.activeBat[0]];
    }
    advanceBall(fhRuns>=4?'boundary':'done');
    checkChase();render();return;
  }

  const bwl=getBowlersForInnings().find(b=>b.id===st.bowler);
  if(!bwl){addLog('Select a bowler first','over');render();return;}
  if(!st.activeBat||st.activeBat.length<1){addLog('Innings over','over');render();return;}
  const bat=st.batsmen[st.activeBat[0]];
  if(!bat){addLog('No batsman — innings over','over');render();return;}
  const fat=getFieldFatigue();
  const mentality=getStrikerMentality();
  const over=st.over;

  const specialistBonus=getSpecialistBonus(bwl);
  const inherentBonus=getInherentBonus(bwl);
  const effectiveStars=Math.min(5,bwl.stars+specialistBonus+inherentBonus);
  if(st.ball===0){
    // First ball of any over — fire a one-off scouting hint the first time this bowler bowls
    if(!st.seenBowlers) st.seenBowlers={};
    if(!st.seenBowlers[bwl.id]){
      st.seenBowlers[bwl.id]=true;
      const bowlerHints={
        opener:    `${bwl.name} has a habit of making early breakthroughs across all formats`,
        finisher:  `${bwl.name} has been a consistent death-overs performer this season`,
        tailkiller:`${bwl.name} has knocked over the tail end many times in all formats`,
        strike:    `${bwl.name} gets extra pace from this surface — dangerous on a good length`,
        swing:     `${bwl.name} moves the ball both ways — tricky in these conditions`,
        seamer:    `${bwl.name} has been extracting plenty from pitches like this`,
      };
      const typeHints={
        spin: `${bwl.name} has been getting sharp turn on responsive surfaces this term`,
        fast: `${bwl.name} generates real pace — batters have struggled to get on top`,
        medium:`${bwl.name} relies on movement and accuracy rather than raw pace`,
      };
      const hint = bowlerHints[bwl.speciality] || typeHints[bwl.type] || `${bwl.name} takes the ball`;
      addLog(hint,'over');
    }
    // Existing specialist/condition bonuses
    if(specialistBonus>0){
      const msgs={
        opener:`${bwl.name} in their element — early doors`,
        finisher:`${bwl.name} thrives at the death`,
        strike:`${bwl.name} loves the hard, bouncy track`,
        swing:`${bwl.name} will be dangerous in these conditions`,
        seamer:`This pitch was made for ${bwl.name}`,
        tailkiller:`${bwl.name} is lethal against the lower order`,
      };
      if(msgs[bwl.speciality]) addLog(msgs[bwl.speciality],'over');
    }
    if(inherentBonus>0){
      if(bwl.type==='spin'&&st.pitchId==='minefield'&&st.over===6)
        addLog(`The rough is turning square — ${bwl.name} will be dangerous`,'over');
      if(bwl.type==='medium'&&st.weatherId==='damp')
        addLog(`${bwl.name} is getting the ball to swing in the damp`,'over');
    }
  }

  let howzatChance=getHowzatPct(effectiveStars)*getBowlerStarsMod(bwl)*fat.howzatMod*getSpecialistMult(bwl);
  howzatChance*=getMentalityHowzatMod(mentality);
  howzatChance*=getMineFieldMentalityMod(mentality);
  howzatChance*=getBatSpecialismMod(bat,bwl,over);
  howzatChance+=getBatSpecialismMentalityMod(bat,mentality,over);
  howzatChance+=getFieldGamingPenalty().howzat;
  howzatChance+=getRecklessAggressivePenalty(bat,mentality,over);
  howzatChance*=getBattingPersonalityMod();
  howzatChance*=getBowlingPersonalityMod();
  howzatChance+=getDotBallBuff();

  howzatChance=Math.min(getHowzatCap(bat.stars),Math.max(2,howzatChance));

  if(!st.bowlStats[bwl.id]) st.bowlStats[bwl.id]={balls:0,runs:0,wkts:0};
  st.bowlStats[bwl.id].balls++;

  if(pct(howzatChance)){
    if(mentality==='rotation'&&Math.random()<0.08){
      addLog(`${bat.name} — RUN OUT attempting a quick single!`,'howzat');

      triggerHowzat(bwl,bat,true);
    } else {

      // Survived — reset bowler's consecutive wicket count
      if(st.bowler&&st.bowlerConsecWkts&&st.bowlerConsecWkts[st.bowler]){
        st.bowlerConsecWkts[st.bowler]=0;
      }
      triggerHowzat(bwl,bat,false);
    }
    return;
  }

  const runFaces=getMentalityRunFaces(mentality,st.field);
  let face=rnd(runFaces);

  // Strike rotation: last ball of over, protect tail
  if(shouldAttemptRotation()&&st.ball===5){
    if(st.field==='defensive'){
      face=Math.random()<0.4?1:0;
      if(face===0) addLog(`${bat.name} can\'t rotate — field cuts off the single`,'');
    } else {
      face=1;
      addLog(`${bat.name} rotates the strike — tail protected`,'');
    }
  }

  st.batDie=String(face);st.bowlDie=null;

  if(face===0){
    st.consecutiveZeros++;
    st.dotBallBuff=Math.min(2,st.consecutiveZeros)*getDotBallPct();
    // Dot ball is still a non-wicket — reset bowler's consecutive count
    if(st.bowler&&st.bowlerConsecWkts&&st.bowlerConsecWkts[st.bowler]){
      st.bowlerConsecWkts[st.bowler]=0;
    }

    addLog(`${bat.name}: dot ball`,'');
    advanceBall('done');
  } else {
    st.consecutiveZeros=0;st.dotBallBuff=0;st.batConfidence=0;
    // Non-wicket ball — reset this bowler's consecutive wicket count
    if(st.bowler&&st.bowlerConsecWkts&&st.bowlerConsecWkts[st.bowler]){
      st.bowlerConsecWkts[st.bowler]=0;
    }
    let runs=Math.max(0,Math.round(face*fat.runMod*getPersonalityRunMod()));
    const vm=bwl.type==='spin'?bat.vs_spin:bat.vs_fast;
    runs=Math.min(6,Math.round(runs*Math.min(1.3,vm)));
    if(bat.batSpecialism==='big_hitter'&&runs>=4&&Math.random()<0.3) runs=Math.min(6,runs+2);
  // Field gaming bonus: batsman reading the field, finding 2s
  if(getFieldGamingPenalty().runBonus&&runs===1&&Math.random()<0.4) runs=2;
    const confBonus=getConfidenceRunBonus();
    if(confBonus>0&&runs>0) runs=Math.min(6,runs+Math.floor(confBonus/3));
    st.runs+=runs;bat.runs+=runs;bat.balls++;
    st.bowlStats[bwl.id].runs+=runs;
    // Milestone check — stored, logged AFTER the run entry so it appears above it
    let _milestone=null;
    if(bat.runs>=100 && bat.runs-runs<100) _milestone=`${bat.name} raises the bat — ONE HUNDRED! The crowd rise as one.`;
    else if(bat.runs>=50 && bat.runs-runs<50) _milestone=`${bat.name} raises the bat — fifty up!`;

    let cls='',msg=`${bat.name}: ${runs} run${runs!==1?'s':''}`;
    if(runs>=6){msg=`${bat.name}: SIX!`;cls='boundary';}
    else if(runs>=4){msg=`${bat.name}: FOUR!`;cls='boundary';}
    addLog(msg,cls);
    if(_milestone) addLog(_milestone,'boundary');
    // Odd runs on balls 1-5 swap the striker mid-over
    // Odd runs on ball 6 also swap but end-of-over swap brings them back (net: no change)
    const isLastBall = st.ball===5;
    if(runs%2===1 && !isLastBall){
      if(st.activeBat?.length>=2)st.activeBat=[st.activeBat[1],st.activeBat[0]];
    }
    advanceBall(runs>=4?'boundary':'done');
  }
  checkChase();render();
}


function triggerHowzat(bwl,bat,forceRunOut=false){
  // Dismissal type weights based on real T20 statistics
  // Caught Behind has DRS capability, Caught (fielder) does not
  // Stumped only possible off spin
  let types;
  if(bwl.type==='spin'){
    types=[
      {d:'Caught',         w:35, noDrs:true  },
      {d:'Caught Behind',  w:20, noDrs:false },
      {d:'LBW',            w:18, noDrs:false },
      {d:'Bowled',         w:12, noDrs:true  },
      {d:'Stumped',        w:10, noDrs:false },
      {d:'Run Out',        w:5,  noDrs:true  },
    ];
  } else if(bwl.type==='fast'){
    types=[
      {d:'Caught',         w:38, noDrs:true  },
      {d:'Caught Behind',  w:18, noDrs:false },
      {d:'Bowled',         w:25, noDrs:true  },
      {d:'LBW',            w:14, noDrs:false },
      {d:'Run Out',        w:5,  noDrs:true  },
    ];
  } else { // medium
    types=[
      {d:'Caught',         w:40, noDrs:true  },
      {d:'Caught Behind',  w:18, noDrs:false },
      {d:'Bowled',         w:20, noDrs:true  },
      {d:'LBW',            w:15, noDrs:false },
      {d:'Run Out',        w:7,  noDrs:true  },
    ];
  }

  // Weighted pick
  const total=types.reduce((s,x)=>s+x.w,0);
  let r=Math.random()*total;
  let chosen=types[0];
  for(const t of types){r-=t.w;if(r<=0){chosen=t;break;}}
  const dtype=chosen.d;
  const drsAllowed=!chosen.noDrs;

  const ump=st.umpires[st.activeUmpIdx];
  const isOut=getUmpireOut(ump);
  st.bowlDie=dtype;

  if(dtype==='Bowled'){
    st.pendingDismissal={bwl,dtype,ump,umpIdx:st.activeUmpIdx,givenOut:true,noDrs:true,thirdUmp:st.umpires[st.activeUmpIdx===0?1:0]};
    addLog(`${bat.name} — BOWLED! Stumps shattered`,'howzat');
    advanceBall('wkt');
  } else if(dtype==='Run Out'||dtype==='Stumped'){
    // Auto-referred to third umpire — resolves immediately
    const reviewIdx=st.activeUmpIdx===0?1:0;
    const thirdUmp=st.umpires[reviewIdx];
    const thirdOut=getUmpireOut(thirdUmp);
    addLog(`${dtype}! Referred straight to third umpire (${thirdUmp.name})…`,'howzat');
    advanceBall(thirdOut?'wkt':'done');
    if(thirdOut){
      addLog(`Third umpire: OUT — ${dtype}!`,'wkt');
      dismissBatsman(dtype,'');
    } else {
      addLog(`Third umpire: NOT OUT — ${bat.name} survives`,'review');
    }
    checkChase();render();return;
  } else if(isOut){
    const lbwReviewable=dtype==='LBW';
    st.pendingDismissal={bwl,dtype,ump,umpIdx:st.activeUmpIdx,givenOut:true,noDrs:!drsAllowed,lbwReviewable,thirdUmp:st.umpires[st.activeUmpIdx===0?1:0]};
    let dismissalMsg=`Howzat! ${ump.name} raises the finger — ${dtype}!`;
    if(dtype==='Caught Behind'){
      const team=getMatchTeam(st.innings);
      const keeper=team.players.find(p=>p.isWk);
      if(keeper) dismissalMsg=`Howzat! ${ump.name} raises the finger — Caught behind by ${keeper.name}†!`;
    }
    addLog(dismissalMsg,'howzat');
    advanceBall('wkt');
    // CPU batting DRS fires after render (see end of function)
  } else {
    // Not out — bowling team may DRS if dismissal type allows it
    const thirdUmp=st.umpires[st.activeUmpIdx===0?1:0];
    const flavour=getNotOutFlavour(dtype,ump.name,thirdUmp.name);
    st.pendingDismissal={bwl,dtype,ump,umpIdx:st.activeUmpIdx,givenOut:false,noDrs:!drsAllowed,
      notOutMsg:flavour.referral, verdictMsg:flavour.verdict, thirdUmp};
    addLog(`${flavour.referral}`,'howzat');
    advanceBall('done');
  }
  render();
  // CPU auto-DRS — fires after render so UI is settled
  if(st.pendingDismissal) applyCpuDrsIfNeeded();
}

// Single dismissal handler — all paths go through here to avoid count drift
function dismissBatsman(dtype, logPrefix){
  const bat=st.batsmen[st.activeBat[0]];
  bat.status='out';
  st.wickets++;
    // Credit wicket to current bowler + hat trick tracking
  if(st.bowler){
    if(!st.bowlStats[st.bowler]) st.bowlStats[st.bowler]={balls:0,runs:0,wkts:0};
    st.bowlStats[st.bowler].wkts++;
    const bwlWkts = st.bowlStats[st.bowler].wkts;
    // Consecutive wicket tracking per bowler
    if(!st.bowlerConsecWkts) st.bowlerConsecWkts={};
    if(st.lastWicketBowler===st.bowler && st.lastWicketBowler!==null){
      st.bowlerConsecWkts[st.bowler]=(st.bowlerConsecWkts[st.bowler]||1)+1;
    } else {
      // Different bowler — reset others, start this one
      st.bowlerConsecWkts={};
      st.bowlerConsecWkts[st.bowler]=1;
    }
    st.lastWicketBowler=st.bowler;
    const consec=st.bowlerConsecWkts[st.bowler]||1;
    const bwlName=getBowlersForInnings().find(b=>b.id===st.bowler)?.name||'Bowler';
    // Hat trick milestones
    if(consec===3) addLog(`🎩 HAT TRICK! ${bwlName} — three in a row!`,'boundary');
    else if(consec===4) addLog(`🎩🎩 DOUBLE HAT TRICK! ${bwlName} — four in a row!`,'boundary');
    else if(consec>=5){
      const names=['','','','','Triple','Quadruple','Quintuple','Sextuple'];
      const n=names[consec]||`${consec}-wicket`;
      addLog(`🎩 ${n.toUpperCase()} HAT TRICK! ${bwlName} — ${consec} in a row!`,'boundary');
    }
    // 5-wicket milestone
    if(bwlWkts===5) addLog(`${bwlName} holds the ball aloft — five wickets!`,'boundary');
  }
  // Set wicket survival decay buff for incoming batsman
  st.wicketDecayBuff=15;
  addLog(`${logPrefix}${bat.name} — ${dtype}! Wicket #${st.wickets}`,'wkt');
  checkMilestones(bat);
  st.pendingDismissal=null;
  nextBatsman();
}

function acceptDismissal(){
  if(!st.pendingDismissal||!st.pendingDismissal.givenOut)return;
  dismissBatsman(st.pendingDismissal.dtype,'');
  checkChase();render();

function dismissNotOut(){

  addLog('Not out stands','over');
  st.pendingDismissal=null;
  checkChase();render();
}

function callReview(){
  if(!st.pendingDismissal)return;
  const d=st.pendingDismissal;
  const reviewUmp=d.thirdUmp;

  if(d.givenOut){
    if(st.reviewsLeft<=0)return;
    const thirdOut=getUmpireOut(reviewUmp);
    if(thirdOut){
      addLog(`Third umpire (${reviewUmp.name}): OUT upheld`,'wkt');
      st.reviewsLeft--;
      dismissBatsman(d.dtype,'');
    } else {
      addLog(`Third umpire (${reviewUmp.name}): NOT OUT — overturned`,'review');
      st.pendingDismissal=null;
    }
  } else {
    if(st.bowlingReviewsLeft<=0)return;
    const thirdOut=getUmpireOut(reviewUmp);
    if(thirdOut){
      addLog(`Third umpire (${reviewUmp.name}): OUT — reversed!`,'wkt');
      dismissBatsman(d.dtype,'');
    } else {
      // 10% chance third umpire spots a no-ball during LBW or Caught Behind review
      if((d.dtype==='LBW'||d.dtype==='Caught Behind') && Math.random()<0.10){
        const bat=st.batsmen[st.activeBat[0]];
        const noballLines= d.dtype==='Caught Behind' ? [
          `Third umpire (${reviewUmp.name}): checking the delivery… NO BALL! The bowler overstepped — ${bat.name} not out!`,
          `${reviewUmp.name} on the monitor — hold on, NO BALL! Doesn't matter what happened at the crease. +1 run!`,
          `Third umpire (${reviewUmp.name}): foot over the line — NO BALL! ${bat.name} survives!`,
          `${reviewUmp.name}: NO BALL! The front foot was well over. ${bat.name} not out!`,
        ] : [
          `Third umpire (${reviewUmp.name}): checking the crease… WAIT — NO BALL! ${bat.name} not out!`,
          `${reviewUmp.name} on the monitor — that's a NO BALL! Decision overturned. +1 run!`,
          `Third umpire (${reviewUmp.name}): back foot over the crease — NO BALL! NOT OUT!`,
          `${reviewUmp.name}: NO BALL called! The bowler overstepped. ${bat.name} survives!`,
        ];
        addLog(noballLines[Math.floor(Math.random()*noballLines.length)],'review');
        st.runs+=1;
        // Review retained — not a wrong call, just a no-ball
        // Ball does not count — do not advance (advanceBall was already called before howzat)
        // Undo the ball advance
        st.ball=Math.max(0,st.ball-1);
        if(st.overBalls.length>0) st.overBalls.pop();
        st.ballsSinceBatArrived=Math.max(0,st.ballsSinceBatArrived-1);
        st.freeHit=true;
        addLog(`🟡 FREE HIT — ${bat.name} can only be dismissed by a run-out!`,'boundary');
        st.pendingDismissal=null;
      } else {
        addLog(`Third umpire (${reviewUmp.name}): NOT OUT confirmed — review lost`,'review');
        st.bowlingReviewsLeft--;
        st.pendingDismissal=null;
      }
    }
  }
  checkChase();render();
}

function checkChase(){
  if(st.innings!==2||st.team1Score===null)return;
  if(st.runs>st.team1Score){st.done=true;addLog(`Team 2 win! ${st.runs}/${st.wickets} — target beaten`,'boundary');}
}

function nextBatsman(){
  if(st.wickets>=10){st.done=true;if(st.innings===1)st._t1log=[...st.log];addLog('All out!','wkt');return;}
  const waiting=st.batsmen.filter(b=>b.status==='waiting');
  if(!waiting.length){st.done=true;if(st.innings===1)st._t1log=[...st.log];addLog('All out!','wkt');return;}
  st.pendingWicket=true; // batting team must choose next batsman
}

function sendNextBatsman(){
  // Send in whoever is next in the list
  const next=st.batsmen.findIndex(b=>b.status==='waiting');
  if(next===-1){st.done=true;st.pendingWicket=false;render();return;}
  sendBatsman(next);
}

function sendBatsman(idx){
  if(!st.pendingWicket&&!isCpuBatting()) return; // guard double-send
  if(st.batsmen[idx].status!=='waiting') return;
  st.batsmen[idx].status='in';
  st.activeBat[0]=idx;
  st.consecutiveZeros=0;st.dotBallBuff=0;st.batConfidence=0;st.ballsSinceBatArrived=0;st.wicketDecayBuff=0;st.bowlerConsecWkts={};st.lastWicketBowler=null;
  // Reset field change counter for new batsman
  if(st.activeBat?.[0]!=null) delete st.fieldChangesVsBat[st.activeBat[0]];
  st.pendingWicket=false;
  // Preserve non-striker's mentality, reset new batsman to positive
  if(!st.mentalities[idx]) st.mentalities[idx]='positive';
  const _bat=st.batsmen[idx];
  addLog(`${_bat.name} comes to the crease`,'over');
  // One-off scouting hint for opposition bowler (via commentary)
  if(!st.seenBatsmen) st.seenBatsmen={};
  if(!st.seenBatsmen[idx]){
    st.seenBatsmen[idx]=true;
    const spec=_bat.batSpecialism||'none';
    const vf=_bat.vs_fast||1.0;
    const vs=_bat.vs_spin||1.0;
    let hint=null;
    if(spec==='big_hitter')      hint=`${_bat.name} has been clearing the ropes regularly this season`;
    else if(spec==='closer')     hint=`${_bat.name} is known for finishing innings under pressure`;
    else if(spec==='rotation')   hint=`${_bat.name} works the ball around well — always looking for the single`;
    else if(spec==='lower_order')hint=`${_bat.name} has a tidy defensive technique for a lower-order batter`;
    else if(spec==='vs_spin')    hint=`${_bat.name} has scored freely against spin this season`;
    else if(spec==='vs_fast')    hint=`${_bat.name} has handled the short ball well this year`;
    else if(vf>=1.15)            hint=`${_bat.name} looks comfortable against pace — not easy to pin down`;
    else if(vs>=1.15)            hint=`${_bat.name} plays spin with confidence — uses the feet well`;
    else if(vf<=0.75)            hint=`${_bat.name} has had some difficulties against the moving ball recently`;
    else if(vs<=0.75)            hint=`${_bat.name} has looked less at ease against spin of late`;
    if(hint) addLog(hint,'over');
  }
  render();
}

function advanceBall(pipType){
  st.overBalls.push({type:pipType});
  st.ballsSinceBatArrived++;
  // Decay wicket survival boost each ball: 8→4→2→1→0
  if(st.wicketDecayBuff>=15)     st.wicketDecayBuff=8;
  else if(st.wicketDecayBuff>=8)  st.wicketDecayBuff=4;
  else if(st.wicketDecayBuff>=4)  st.wicketDecayBuff=2;
  else if(st.wicketDecayBuff>=2)  st.wicketDecayBuff=1;
  else                            st.wicketDecayBuff=0;
  if(st.fieldStreak.id===st.field){st.fieldStreak.count++;}
  else{st.fieldStreak={id:st.field,count:1}; st.batConfidence=0;} // field changed — reset confidence
  // Build batsman confidence per ball faced with same field
  st.batConfidence=Math.min(20,st.batConfidence+1);
  st.ball++;
  if(st.ball>=6){
    st.ball=0;
    if(st.bowler)st.bowlerOvers[st.bowler]=(st.bowlerOvers[st.bowler]||0)+1;
    st.over++;st.overBalls=[];st.mustChangeBowler=true;
    const outgoingUmp=st.umpires[st.activeUmpIdx].name;
    st.activeUmpIdx=st.activeUmpIdx===0?1:0;
    if(st.activeBat?.length>=2)st.activeBat=[st.activeBat[1],st.activeBat[0]];
    if(st.over>10){st.done=true;if(st.innings===1)st._t1log=[...st.log];addLog('10 overs — innings over!','over');return;}
    const fat=getFieldFatigue();
    addLog(`— Over ${st.over-1} end | ${st.runs}/${st.wickets}${fat.label?' | '+fat.label:''} —`,'over');
    addLog(`${outgoingUmp} moves to square leg`,'over');
  }
}

function selectBowler(id){
  if(st.done||st.matchOver)return;
  if(!st.mustChangeBowler&&st.bowler&&st.ball>0)return;
  if(id===st.bowler&&st.ball===0)return;
  if((st.bowlerOvers[id]||0)>=2){addLog('Bowler has used both overs','over');render();return;}
  st.bowler=id;st.mustChangeBowler=false;
  const _bwlName=getBowlersForInnings().find(b=>b.id===id)?.name||id;
  addLog(`${_bwlName} to bowl over ${st.over}`,'over');
  render();
}

function selectField(id){
  if(!st.done&&!st.matchOver&&!st.pendingDismissal){
    if(st.field!==id){
      const icons={attacking:'⚔️',balanced:'⚖️',defensive:'🛡️'};
      addLog(`Field: ${icons[st.field]||st.field} → ${icons[id]||id} ${id}`,'over');
      // Track field changes against current striker
      const strikerId=st.activeBat?.[0];
      if(strikerId!=null && st.ball>0){
        st.fieldChangesVsBat[strikerId]=(st.fieldChangesVsBat[strikerId]||0)+1;
      }
    }
    st.field=id;render();
  }
}

// CPU LOGIC
// ═══════════════════════════════════════

function isCpuBowling(){
  // CPU controls the fielding team this innings?
  const team1BatsFirst = st.pendingChoice !== 'bowl';
  const fieldingSlot = (st.innings===1) === team1BatsFirst ? 't2' : 't1';
  return st.cpuTeam === fieldingSlot;
}

function isCpuBatting(){
  const team1BatsFirst = st.pendingChoice !== 'bowl';
  const battingSlot = (st.innings===1) === team1BatsFirst ? 't1' : 't2';
  return st.cpuTeam === battingSlot;
}

function cpuSelectField(){
  // Returns 'attacking'|'balanced'|'defensive'
  const bat = st.batsmen[st.activeBat[0]];
  const batStar = bat ? bat.stars : 3;
  const ballsFaced = st.ballsSinceBatArrived;
  const runsAhead = st.innings===2 ? (st.team1Score - st.runs) : 0;
  const runsNeeded = st.innings===2 ? (st.team1Score + 1 - st.runs) : 0;
  const ballsLeft = (10 - st.over) * 6 + (6 - st.ball);
  const nearWin = st.innings===2 && runsNeeded <= 15;

  // 1★ batsman special rules (checked first)
  if(batStar === 1){
    if(nearWin) return 'defensive';
    if(runsAhead >= 30) return 'attacking';
  }

  // New batsman (0-7 balls faced) → attacking, they're nervous
  if(ballsFaced <= 7) return 'attacking';

  // 2+ consecutive dots built up → cash in with attacking
  if(st.consecutiveZeros >= 2) return 'attacking';

  // Batsman settled (8+ balls) → defensive to build pressure
  if(ballsFaced >= 8) return 'defensive';

  return 'balanced';
}

// ── Collapse intelligence: cap mentality ceiling based on wickets lost ──
function applyWicketCeiling(base, wkts, over){
  const levels = ['defensive','rotation','positive','aggressive'];
  let ceiling;
  if(wkts >= 7)                     ceiling = 'defensive';
  else if(wkts >= 5 && over < 8)   ceiling = 'rotation';
  else if(wkts >= 3 && over < 6)   ceiling = 'positive';
  else                              ceiling = 'aggressive';
  // Late-over unlocks — survival mode relaxes when time runs out
  if(over >= 9 && wkts <= 6)       ceiling = 'aggressive';
  else if(over >= 8 && wkts <= 5)  ceiling = 'positive';
  const ceilIdx = levels.indexOf(ceiling);
  const baseIdx = levels.indexOf(base);
  return baseIdx > ceilIdx ? ceiling : base;
}

function smartHumanMentality(batIdx){
  const bat = st.batsmen[batIdx];
  if(!bat) return 'positive';
  const over = st.over;
  const wkts = st.wickets;
  const bowler = getBowlersForInnings().find(b=>b.id===st.bowler);
  const bowlerStars = bowler ? bowler.stars : 3;
  const spec = bat.batSpecialism || 'none';
  if(spec === 'lower_order') return 'defensive';
  if(spec === 'rotation') return 'rotation';
  let base;
  if(over <= 2){
    base = wkts === 0 ? 'rotation' : 'defensive';
  } else if(over <= 4){
    base = wkts <= 1 ? 'positive' : 'rotation';
    if(wkts >= 4) base = 'defensive';
  } else if(over <= 8){
    base = 'positive';
    if(wkts >= 3) base = 'rotation';
    if(wkts >= 5) base = 'defensive';
  } else {
    base = 'aggressive';
    if(wkts >= 4) base = 'positive';
    if(wkts >= 6) base = 'rotation';
  }
  if(over >= 4 && over <= 8 && wkts <= 2 && bowlerStars <= 2){
    if(Math.random() < 0.40) return 'aggressive';
  }
  if(spec === 'big_hitter'){
    const levels = ['defensive','rotation','positive','aggressive'];
    const idx = levels.indexOf(base);
    if(idx < levels.length - 1) base = levels[idx + 1];
  }
  if(spec === 'closer' && over >= 8){
    const levels = ['defensive','rotation','positive','aggressive'];
    const idx = levels.indexOf(base);
    if(idx < levels.length - 1) base = levels[idx + 1];
  }
  // Par-aware band: target = 110% of par (105% on Minefield — set modest, leave chaseable)
  const levels = ['defensive','rotation','positive','aggressive'];
  const key = st.pitchId + '_' + st.weatherId;
  const parMult = st.pitchId === 'minefield' ? 1.05 : 1.10;
  const parFinal = (PAR_SCORES[key] || 110) * parMult;
  const totalBalls = 60;
  const ballsBowled = (st.over - 1) * 6 + st.ball;
  if(ballsBowled > 6){
    const targetNow = (parFinal / totalBalls) * ballsBowled;
    const delta = st.runs - targetNow;
    const i = levels.indexOf(base);
    if(delta > 10 && i > 0) base = levels[i - 1];       // well ahead — consolidate
    else if(delta < -10 && i < levels.length - 1) base = levels[i + 1]; // behind — push
  }
  return applyWicketCeiling(base, wkts, over);
}

function smartHumanMentalityChase(batIdx){
  const bat = st.batsmen[batIdx];
  if(!bat) return 'positive';
  const over = st.over;
  const wkts = st.wickets;
  const spec = bat.batSpecialism || 'none';
  const runsNeeded = (st.team1Score + 1) - st.runs;
  const ballsLeft = (10 - over) * 6 + (6 - st.ball);
  const rrRequired = ballsLeft > 0 ? (runsNeeded / ballsLeft) * 6 : 99;
  // Smart CPU targets 0.5 RPO ahead of required — always in control, never scrambling
  const rrTarget = rrRequired + 0.5;
  if(spec === 'lower_order') return wkts >= 7 ? 'defensive' : 'rotation';
  let base;
  if(rrTarget > 13)      base = 'aggressive';
  else if(rrTarget > 11) base = wkts <= 6 ? 'positive' : 'rotation';
  else if(rrTarget > 8)  base = 'positive';
  else if(rrTarget > 6)  base = wkts <= 4 ? 'rotation' : 'defensive';
  else if(rrTarget > 4)  base = 'defensive';
  else                   base = 'defensive';
  if(spec === 'big_hitter' && rrTarget > 7){
    const levels = ['defensive','rotation','positive','aggressive'];
    const idx = levels.indexOf(base);
    if(idx < levels.length - 1) base = levels[idx + 1];
  }
  if(spec === 'closer' && over >= 8){
    const levels = ['defensive','rotation','positive','aggressive'];
    const idx = levels.indexOf(base);
    if(idx < levels.length - 1) base = levels[idx + 1];
  }
  if(spec === 'rotation') base = base === 'aggressive' ? 'positive' : base;
  return applyWicketCeiling(base, wkts, over);
}

// ── Par score table (from 5000-game sim, smart human both sides) ──
// Keyed by pitchId_weatherId → expected first-innings total
// Used by CPU captain to gauge whether batting team is ahead/behind par
const PAR_SCORES = {
  minefield_sunny:76, minefield_overcast:76, minefield_damp:76,
  good_sunny:121, good_overcast:118, good_hot:120, good_damp:125,
  flat_sunny:122, flat_overcast:120, flat_hot:125, flat_damp:120,
};

// Returns runs ahead of par at current ball (positive = ahead, negative = behind)
function getRunsAheadOfPar(){
  const key = st.pitchId + '_' + st.weatherId;
  const parFinal = PAR_SCORES[key] || 110;
  const totalBalls = 60;
  const ballsBowled = (st.over - 1) * 6 + st.ball;
  if(ballsBowled === 0) return 0;
  const parNow = (parFinal / totalBalls) * ballsBowled;
  return st.runs - parNow;
}

function smartHumanField(){
  const over = st.over;
  const wkts = st.wickets;
  if(st.innings === 2){
    const runsNeeded = st.team1Score + 1 - st.runs;
    const ballsLeft = (10 - over) * 6 + (6 - st.ball);
    const rrRequired = ballsLeft > 0 ? (runsNeeded / ballsLeft) * 6 : 99;
    // defensive saves boundaries when chaser is slogging
    // attacking (close catchers) when comfortable — take wickets
    if((rrRequired > 11 && wkts < 7) || rrRequired > 14) return 'defensive';
    if(rrRequired < 6) return 'attacking';
    return 'balanced';
  } else {
    // Par-aware bowling: attack when batting team is cruising, sit back when struggling
    const runsAhead = getRunsAheadOfPar();
    const ballsBowled = (over - 1) * 6 + st.ball;
    if(ballsBowled > 6){
      if(runsAhead > 10)  return 'attacking';  // they're cruising — attack
      if(runsAhead < -10) return 'defensive';  // they're struggling — let them take risks
    }
    if(over <= 3) return 'attacking';
    if(wkts <= 2 && over <= 6) return 'balanced';
    if(wkts >= 5) return 'attacking';
    if(over >= 9) return 'attacking';
    return 'balanced';
  }
}

function cpuSelectMentality(batIdx){
  const bat = st.batsmen[batIdx];
  if(!bat) return 'positive';

  const spec = bat.batSpecialism || 'none';
  const wkts = st.wickets;
  const wktsLeft = 10 - wkts;
  const over = st.over;

  // Specialism overrides
  if(spec === 'lower_order') return 'defensive';
  if(spec === 'rotation') return 'rotation';

  // Last 2 wickets — cap at positive
  if(wktsLeft <= 2) return 'positive';

  if(st.innings === 2){
    // Chasing — required rate drives mentality
    const runsNeeded = st.team1Score + 1 - st.runs;
    const ballsLeft = (10 - over) * 6 + (6 - st.ball);
    const rrRequired = ballsLeft > 0 ? (runsNeeded / ballsLeft) * 6 : 99;

    // Wicket pressure overrides
    if(wkts >= 5) return rrRequired > 10 ? 'positive' : 'rotation';
    if(wkts >= 3 && rrRequired <= 7) return 'rotation';

    if(rrRequired > 12) return 'aggressive';
    if(rrRequired > 9)  return 'positive';
    if(rrRequired > 6)  return 'positive';
    return 'rotation';
  } else {
    // Setting — identical to smart human logic
    const bowlers = getBowlersForInnings();
    const bowler = bowlers.find(b=>b.id===st.bowler);
    const bowlerStars = bowler ? bowler.stars : 3;

    let base;
    if(over <= 2){
      base = wkts === 0 ? 'rotation' : 'defensive';
    } else if(over <= 4){
      base = wkts <= 1 ? 'positive' : 'rotation';
      if(wkts >= 4) base = 'defensive';
    } else if(over <= 8){
      base = 'positive';
      if(wkts >= 3) base = 'rotation';
      if(wkts >= 5) base = 'defensive';
    } else {
      base = 'aggressive';
      if(wkts >= 4) base = 'positive';
      if(wkts >= 6) base = 'rotation';
    }

    // Opportunistic aggression vs weak bowler (overs 4-8, 0-2 wkts)
    if(over >= 4 && over <= 8 && wkts <= 2 && bowlerStars <= 2){
      if(Math.random() < 0.40) return 'aggressive';
    }

    // Big hitter bumps up one level
    if(spec === 'big_hitter'){
      const levels = ['defensive','rotation','positive','aggressive'];
      const idx = levels.indexOf(base);
      if(idx < levels.length - 1) base = levels[idx + 1];
    }

    return base;
  }
}


// CPU DRS decision — called when a dismissal is pending
// CPU reviews based on umpire quality: weak umpire = likely to review, strong = rare
function cpuShouldReview(){
  const d = st.pendingDismissal;
  if(!d || d.noDrs) return false;
  const ump = st.umpires[d.umpIdx];
  if(!ump) return false;
  // Umpire strength: 'Weak'=1, 'Fair'=2, 'Good'=3, 'Strong'=4
  const strengthMap = {'Weak':1,'Fair':2,'Good':3,'Strong':4};
  const str = strengthMap[ump.strength] || 2;
  // Review probability: weak ump → high chance, strong → low chance
  const reviewChance = {1:0.75, 2:0.45, 3:0.20, 4:0.08}[str] || 0.35;
  return Math.random() < reviewChance;
}

function applyCpuDrsIfNeeded(){
  if(!st.pendingDismissal) return;
  const d = st.pendingDismissal;

  // CPU controls batting DRS when CPU is batting
  if(isCpuBatting() && d.givenOut){
    if(!d.noDrs && st.reviewsLeft > 0 && cpuShouldReview()){
      // CPU reviews — resolve it, then show result and wait for human to tap Next ball
      setTimeout(()=>{callReview();render();}, 500);
    } else {
      // CPU accepts — dismiss but stay on commentary so human can read it
      setTimeout(()=>{
        acceptDismissal();
        // Don't auto-advance — human taps Next ball
        render();
      }, 500);
    }
    return;
  }
  // CPU controls bowling DRS when CPU is bowling
  if(isCpuBowling() && !d.givenOut){
    if(!d.noDrs && st.bowlingReviewsLeft > 0 && cpuShouldReview()){
      setTimeout(()=>{callReview();render();}, 500);
    }
    // Human taps "Continue Playing" regardless
    return;
  }
}

function cpuSelectBowler(){
  // Pick best available bowler for this over
  const bowlers = getBowlersForInnings();
  const ot = st.over <= 5 ? 'fast' : 'spin';
  const avail = bowlers.filter(b => (st.bowlerOvers[b.id]||0) < 2 && b.id !== st.bowler);
  const pool = avail.length ? avail : bowlers.filter(b => (st.bowlerOvers[b.id]||0) < 2);
  if(!pool.length) return null;
  const scored = pool.map(b => {
    let sc = b.stars;
    if(b.type === ot) sc += 2;
    if(b.speciality === 'opener' && st.over <= 2) sc += 2;
    if(b.speciality === 'finisher' && st.over >= 9) sc += 2;
    return {b, sc};
  });
  scored.sort((a,b) => b.sc - a.sc);
  return scored[0].b.id;
}

function applyCpuBowlerIfNeeded(){
  if(!isCpuBowling()) return;
  if(!st.mustChangeBowler && st.bowler && st.ball > 0) return;
  const id = cpuSelectBowler();
  if(id){
    // Silent selection — no log, human sees it on the bowling screen
    st.bowler=id; st.mustChangeBowler=false;
  }
}

function applyCpuFieldIfNeeded(){
  if(!isCpuBowling()) return;
  const field = st.cpuDifficulty === 'hard' ? smartHumanField() : cpuSelectField();
  if(st.field !== field){
    // Ball 0 of over 1 — set silently, no log (field wasn't shown yet)
    const silent = st.over === 1 && st.ball === 0;
    if(!silent){
      const icons={attacking:'⚔️',balanced:'⚖️',defensive:'🛡️'};
      addLog(`Field: ${icons[st.field]||st.field} → ${icons[field]||field} ${field}`,'over');
    }
    st.field = field;
  }
}

function applyCpuMentalityIfNeeded(){
  if(!isCpuBatting()) return;
  if(!st.activeBat) return;
  st.activeBat.forEach(idx => {
    let mentality;
    if(st.cpuDifficulty === 'hard'){
      mentality = st.innings === 2 ? smartHumanMentalityChase(idx) : smartHumanMentality(idx);
    } else {
      mentality = cpuSelectMentality(idx);
    }
    st.mentalities[idx] = mentality;
  });
}

function startSecondInnings(){
  st._t1runs=st.runs; st._t1wkts=st.wickets;
  if(!st._t1log) st._t1log=[...st.log]; // snapshot taken at innings end
  st.gameScreen='bowling';

}

function confirmProfile2(profileKey){

  st.team1Score=st._t1runs; st.team1Wickets=st._t1wkts;

  st.activeBat=[0,1];st.bowler=null;st.bowlerOvers={};st.bowlStats={};
  st.mustChangeBowler=false;st.pendingDismissal=null;
  st.batDie=null;st.bowlDie=null;st.done=false;st.overBalls=[];

  st.fieldChangesVsBat={};

}


function addLog(msg,cls){st.log.unshift({msg,cls});if(st.log.length>150)st.log.pop();}

function getMatchResult(){
  if(st.innings!==2||st.team1Score===null||!st.done)return null;
  const t1name=getMatchTeam(1).name, t2name=getMatchTeam(2).name;
  let result;
  if(st.runs>st.team1Score) result={text:`${t2name} win by ${11-st.wickets} wickets! (${st.runs}/${st.wickets} vs ${st.team1Score}/${st.team1Wickets})`,cls:'result-win'};
  else if(st.runs===st.team1Score) result={text:`Match tied! Both scored ${st.team1Score}`,cls:'result-tie'};
  else result={text:`${t1name} win by ${st.team1Score-st.runs} runs! (${st.team1Score}/${st.team1Wickets} vs ${st.runs}/${st.wickets})`,cls:'result-loss'};
  recordMatchResult();
  return result;
}

function generateTranscript(){
  const t1=getMatchTeam(1), t2=getMatchTeam(2);
  const pitch=PITCH_OPTS.find(p=>p.id===st.pitchId)||{label:'Unknown'};
  const weather=WEATHER_OPTS.find(w=>w.id===st.weatherId)||{label:'Unknown'};
  const lines=[];

  lines.push('═══════════════════════════════════════');
  lines.push('COUNTY CRICKET — MATCH TRANSCRIPT (v9)');
  lines.push('═══════════════════════════════════════');
  lines.push(`${t1.name} vs ${t2.name}`);
  lines.push(`Pitch: ${pitch.label} · Weather: ${weather.label}`);
  lines.push('');

  // First innings log (oldest first)
  const inn1log = st._t1log ? [...st._t1log].reverse() : [];
  if(inn1log.length){
    lines.push(`── FIRST INNINGS: ${t1.name} ──`);
    inn1log.forEach(e=>lines.push(e.msg));
    if(st.team1Score!==null) lines.push(`Result: ${st.team1Score}/${st.team1Wickets}`);
    lines.push('');
  }

  // Second innings / current innings log (oldest first)
  const inn2log=[...st.log].reverse();
  const innLabel = st.innings===1 ? 'FIRST INNINGS' : 'SECOND INNINGS';
  lines.push(`── ${innLabel}: ${getMatchTeam(st.innings).name} ──`);
  inn2log.forEach(e=>lines.push(e.msg));
  lines.push(`Score at time of export: ${st.runs}/${st.wickets} (over ${st.over}.${st.ball})`);

  // Result if complete
  const result=getMatchResult();
  if(result){
    lines.push('');
    lines.push('── RESULT ──');
    lines.push(result.text);
  }

  lines.push('');
  lines.push('═══════════════════════════════════════');
  return lines.join('\n');
}

function tossTheCoin(){
  const coin=document.getElementById('coin');
  if(coin)coin.classList.add('spin');
  setTimeout(()=>{
    st.tossWinner=Math.random()<.5?'team1':'team2';
    // Conditions already chosen on conditions screen — don't re-roll
    const shuffled=[...UMPIRE_POOL].sort(()=>Math.random()-.5);
    st.umpires=[{...shuffled[0]},{...shuffled[1]}];
    // If CPU won the toss, it decides immediately
    const cpuWonToss = st.cpuTeam && (
      (st.tossWinner==='team1' && st.cpuTeam==='t1') ||
      (st.tossWinner==='team2' && st.cpuTeam==='t2')
    );
    if(cpuWonToss){
      // On Minefield, CPU always bats first — pitch is too dangerous to chase
      // Otherwise: CPU prefers to bowl first on overcast/damp, bat otherwise
      const cpuWantsBowl = st.pitchId!=='minefield' &&
        (st.weatherId==='overcast' || st.weatherId==='damp') && Math.random()<0.7;
      // chooseBatBowl('bat') = team1 bats first
      // If CPU is t1 and wants to bowl → choice='bowl' (team1 bowls, team2 bats)
      // If CPU is t2 and wants to bowl → choice='bat' (team1 bats, team2 bowls)
      let choice;
      if(st.cpuTeam==='t1') choice = cpuWantsBowl ? 'bowl' : 'bat';
      else                   choice = cpuWantsBowl ? 'bat'  : 'bowl';
      st.phase='choose_bat_bowl';
      render(); // show "CPU deciding…"
      setTimeout(()=>{chooseBatBowl(choice);},800);
    } else {
      st.phase='choose_bat_bowl';
      render();
    }
  },700);
}

function getCpuBowlFlavour(){
  const bwl=st.bowler?getBowlersForInnings().find(b=>b.id===st.bowler):null;
  if(!bwl) return 'The bowler stands at the top of their mark.';
  const hand=bwl.hand==='R'?'right':'left';
  const type=bwl.type==='fast'?'quick':'spin';
  const lines=[
    bwl.name+' stands at the top of their mark.',
    bwl.name+' turns, ball in '+hand+' hand.',
    bwl.name+' paces back to their mark.',
    bwl.name+' adjusts their grip — '+(type==='quick'?'fingers across the seam.':'fingers around the seam.'),
  ];
  return lines[Math.floor(Math.random()*lines.length)];
}
